        // ── Toast system ──────────────────────────────────────────────
        let _setToasts = null;
        const toast = (msg, type = 'success') => {
            if (!_setToasts) return;
            const id = Date.now() + Math.random();
            _setToasts(p => [...p, { id, msg, type }]);
            setTimeout(() => _setToasts(p => p.filter(t => t.id !== id)), 3500);
        };
        function ToastContainer() {
            const [toasts, setToasts] = useState([]);
            useEffect(() => { _setToasts = setToasts; return () => { _setToasts = null; }; }, []);
            if (!toasts.length) return null;
            const bg = { success:'#10b981', error:'#ef4444', warning:'#f59e0b' };
            const icon = { success:'✓', error:'✕', warning:'⚠' };
            return (
                <div style={{position:'fixed',top:'1rem',right:'1rem',zIndex:9999,display:'flex',flexDirection:'column',gap:'0.5rem',pointerEvents:'none'}}>
                    {toasts.map(t => (
                        <div key={t.id} className="toast-anim" style={{background:bg[t.type]||bg.success,color:'#fff',padding:'0.7rem 1rem',borderRadius:'0.75rem',boxShadow:'0 4px 20px -2px rgba(0,0,0,0.25)',fontWeight:600,fontSize:'0.875rem',display:'flex',alignItems:'center',gap:'0.5rem',maxWidth:'320px'}}>

        // Login Component
        function Login() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    console.error('Error al iniciar sesión:', err);
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
                        setError('Email o contraseña incorrectos');
                    } else if (err.code === 'auth/invalid-email') {
                        setError('Email inválido');
                    } else {
                        setError('Error al iniciar sesión. Intenta de nuevo.');
                    }
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4" style={{background:'linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)'}}>
                    {/* decorative blobs */}
                    <div style={{position:'absolute',top:'10%',left:'15%',width:300,height:300,borderRadius:'50%',background:'radial-gradient(circle,rgba(99,102,241,0.18),transparent 70%)',pointerEvents:'none'}}/>
                    <div style={{position:'absolute',bottom:'15%',right:'10%',width:250,height:250,borderRadius:'50%',background:'radial-gradient(circle,rgba(139,92,246,0.15),transparent 70%)',pointerEvents:'none'}}/>
                    <div className="max-w-md w-full relative">
                        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden">
                            {/* top gradient bar */}
                            <div style={{height:5,background:'linear-gradient(90deg,#6366f1,#8b5cf6,#ec4899)'}}/>
                            <div className="p-8">
                                <div className="text-center mb-8">
                                    <div className="inline-flex p-4 rounded-2xl mb-4 shadow-lg" style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)'}}>
                                        <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                        </svg>
                                    </div>
                                    <h1 className="text-3xl font-extrabold text-slate-900 mb-1 tracking-tight">Te lo Imprimo</h1>
                                    <p className="text-slate-500 text-sm font-medium">Sistema de Gestión Interna</p>
                                </div>

                                <form onSubmit={handleLogin} className="space-y-5">
                                    {error && (
                                        <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm flex items-center gap-2">
                                            <Icons.XCircle className="w-4 h-4 flex-shrink-0"/>
                                            {error}
                                        </div>
                                    )}

                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Email</label>
                                        <input
                                            type="email"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            className="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 bg-slate-50 transition text-slate-800 font-medium"
                                            placeholder="tu@email.com"
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Contraseña</label>
                                        <input
                                            type="password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 bg-slate-50 transition text-slate-800 font-medium"
                                            placeholder="••••••••"
                                            required
                                        />
                                    </div>

                                    <button
                                        type="submit"
                                        disabled={loading}
                                        className="w-full text-white py-3.5 rounded-xl font-bold hover:opacity-90 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg text-sm tracking-wide"
                                        style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)'}}
                                    >
                                        {loading ? 'Iniciando sesión...' : 'Iniciar Sesión →'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setUser(user);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = async () => {
                if (window.confirm('¿Estás seguro de que quieres cerrar sesión?')) {
                    await auth.signOut();
                }
            };

            return (
                <>
                    <ToastContainer />
                    {loading ? (
                        <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                            <div className="text-center">
                                <div className="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mx-auto"></div>
                                <p className="mt-4 text-slate-600">Cargando...</p>
                            </div>
                        </div>
                    ) : !user ? (
                        <Login />
                    ) : (
                        <MainApp user={user} onLogout={handleLogout} />
                    )}
                </>
            );
        }

        // Settings Component
        function SettingsView({ config, onSave, materials=[], onSaveMaterial }) {
            const [editableConfig, setEditableConfig] = useState(config);
            const [isSaving, setIsSaving] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [isFetchingBCV, setIsFetchingBCV] = useState(false);
            const [bcvManual, setBcvManual] = useState('');

            // Actualizar cuando cambie config desde Firebase
            useEffect(() => {
                setEditableConfig(config);
            }, [config]);

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        const newConfig = { ...editableConfig, logo: event.target.result };
                        setEditableConfig(newConfig);
                        await onSave(newConfig);
                        toast('Logo guardado y sincronizado');
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSaveConfig = async () => {
                setIsSaving(true);
                try {
                    await onSave(editableConfig);
                    toast('Configuración guardada');
                } catch (error) {
                    console.error('Error al guardar:', error);
                    toast('Error al guardar la configuración', 'error');
                }
                setIsSaving(false);
            };

            const handleFetchBCV = async () => {
                setIsFetchingBCV(true);
                try {
                    let rate = null, updatedAt = new Date().toISOString();

                    // Intento 1: ve.dolarapi.com
                    try {
                        const res = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                        const json = await res.json();
                        if (res.ok && json?.promedio > 0) rate = parseFloat(parseFloat(json.promedio).toFixed(4));
                    } catch (_) {}

                    // Intento 2: pydolarve.org
                    if (!rate) {
                        const res = await fetch('https://pydolarve.org/api/v1/dollar?page=bcv');
                        const json = await res.json();
                        if (res.ok && json?.price > 0) rate = parseFloat(parseFloat(json.price).toFixed(4));
                    }

                    if (!rate) throw new Error('Ambas fuentes fallaron. Ingresa la tasa manualmente.');

                    toast(`Backup creado · ${clients.length} clientes · ${quotes.length} presupuestos`);

                    const clientsSnapshot = await db.collection('clients').get();
                    const quotesSnapshot = await db.collection('quotes').get();

                        const data = doc.data();
                        return {
                            'ID': doc.id,
                            'Nombre': data.name || '',
                            'RIF/CI': data.rif || '',
                            'Email': data.email || '',
                            'Teléfono': data.phone || '',
                            'Dirección': data.address || ''
                        };

                    const quotes = quotesSnapshot.docs.map(doc => {
                        const data = doc.data();
                        const subtotal = data.items?.reduce((sum, item) => 
                            sum + ((item.quantity || 0) * (item.unitPrice || 0)), 0) || 0;
                        const total = data.includeIva ? subtotal * 1.16 : subtotal;
                        
                        return {
                            'Número': data.number || '',
                            'Fecha': data.date || '',
                            'Cliente': data.client?.name || 'N/A',
                            'Vendedor': data.seller || '',

                            'Total': total.toFixed(2),
                            'Estado': data.status || 'borrador',
                            'Condiciones': data.paymentConditions || '',
                            'Notas': data.notes || ''

                        const rows = data.map(row =>

                                // Escapar comillas y agregar comillas si hay comas
                                return value.toString().includes(',') ? `"${value}"` : value;
                            }).join(',')
                        );
                        return [headerRow, ...rows].join('\n');

                    const clientsCSV = createCSV(clients, Object.keys(clients[0] || {}));
                    const quotesCSV = createCSV(quotes, Object.keys(quotes[0] || {}));

                        URL.revokeObjectURL(quotesUrl);

        function MigrarCobradosBtn() {
            const [running, setRunning] = useState(false);

            const handleMigrar = async () => {
                const now = new Date();
                const inicioMesActual = new Date(now.getFullYear(), now.getMonth(), 1);

                if (!window.confirm(
                    `¿Marcar como Cobrados todos los presupuestos Aceptados anteriores a ${inicioMesActual.toLocaleDateString('es')}?\n\nEsta acción no se puede deshacer.`
                )) return;

                setRunning(true);
                try {
                    const snap = await db.collection('quotes').where('status', '==', 'aceptado').get();
                    const batch = db.batch();
                    let count = 0;
                    snap.forEach(doc => {
                        const dateStr = doc.data().date;
                        const parsed = parseQuoteDate(dateStr);
                        if (parsed && parsed < inicioMesActual) {
                            batch.update(doc.ref, { status: 'cobrado' });
                            count++;
                        }
                    });
                    if (count === 0) {
                        toast('No hay presupuestos aceptados de meses anteriores', 'warning');
                        return;
                    }
                    await batch.commit();
                    toast(`${count} presupuesto${count !== 1 ? 's' : ''} marcado${count !== 1 ? 's' : ''} como Cobrado`);
                } catch (e) {
                    console.error(e);
                    toast('Error al migrar. Intentá de nuevo.', 'error');
                } finally {
                    setRunning(false);
                }
            };

            return (
                <button onClick={handleMigrar} disabled={running}
                    className="flex-shrink-0 px-4 py-2 text-sm font-semibold text-white rounded-xl disabled:opacity-50 disabled:cursor-not-allowed transition-opacity"
                    style={{background:'linear-gradient(135deg,#7c3aed,#6d28d9)'}}>
                    {running ? 'Procesando...' : 'Ejecutar'}
                </button>
            );
        }

        // ── Payments View ─────────────────────────────────────────────
        function PaymentsView({ quotes, onAddPayment, onDeletePayment, onMarkCobrado, onViewQuote }) {
            const [search, setSearch] = useState('');
            const [filter, setFilter] = useState('pendiente');
            const [expandedId, setExpandedId] = useState(null);
            const [addingTo, setAddingTo] = useState(null);
            const [payForm, setPayForm] = useState({ amount: '', date: new Date().toISOString().slice(0,10), note: '' });
            const [saving, setSaving] = useState(false);

            const relevant = quotes.filter(q => q.status === 'aceptado' || q.status === 'cobrado');

            const getTotal = (q) => {
                const sub = (q.items||[]).reduce((s,i) => s + ((i.quantity||0)*(i.unitPrice||0)), 0);
                return q.includeIva ? sub * 1.16 : sub;
            };
            const getPaid = (q) => (q.payments||[]).reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
            const getBalance = (q) => Math.max(0, getTotal(q) - getPaid(q));
            const payStatus = (q) => {
                const paid = getPaid(q);
                const total = getTotal(q);
                if (paid >= total - 0.001 && total > 0) return 'cobrado';
                if (paid > 0) return 'parcial';
                return 'pendiente';
            };

            let shown = relevant;
            if (search) {
                const s = search.toLowerCase();
                shown = shown.filter(q => q.client?.name?.toLowerCase().includes(s) || (q.number||'').toLowerCase().includes(s));
            }
            if (filter !== 'todos') shown = shown.filter(q => payStatus(q) === filter);
            shown = [...shown].sort((a,b) => (parseQuoteDate(b.date)||0) - (parseQuoteDate(a.date)||0));

            const totalPendiente = relevant.filter(q => payStatus(q) !== 'cobrado').reduce((s,q) => s + getBalance(q), 0);
            const totalCobrado   = relevant.filter(q => payStatus(q) === 'cobrado').reduce((s,q) => s + getTotal(q), 0);

            const handleAdd = async (quoteId) => {
                if (!payForm.amount || isNaN(parseFloat(payForm.amount)) || parseFloat(payForm.amount) <= 0) {
                    toast('Ingresá un monto válido', 'warning'); return;
                }
                setSaving(true);
                try {
                    await onAddPayment(quoteId, { id: Date.now().toString(), amount: parseFloat(payForm.amount), date: payForm.date, note: payForm.note });
                    setPayForm({ amount: '', date: new Date().toISOString().slice(0,10), note: '' });
                    setAddingTo(null);

            };

            const sBadge = s => ({ cobrado:'bg-violet-100 text-violet-700', parcial:'bg-amber-100 text-amber-700', pendiente:'bg-slate-100 text-slate-600' }[s]||'bg-slate-100 text-slate-600');

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

                            <p className="text-xs font-bold opacity-70 uppercase tracking-widest mb-1">Por cobrar</p>

                            <p className="text-3xl font-extrabold">${totalCobrado.toFixed(2)}</p>

                        <div className="rounded-2xl p-5 bg-white border border-slate-100 shadow-sm">

                        </div>

                            {[['pendiente','Pendiente'],['parcial','Parcial'],['cobrado','Cobrado'],['todos','Todos']].map(([v,l]) => (
                                <button key={v} onClick={() => setFilter(v)}

                    </div>

                    <div className="space-y-3">
                        {shown.length === 0 && (

        // Main App Component (after login)
        function MainApp({ user, onLogout }) {
            const [view, setView] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [clients, setClients] = useState([]);
            const [quotes, setQuotes] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [materials, setMaterials] = useState([]);
            const [products, setProducts] = useState([]);
            const [config, setConfig] = useState({
                logo: '',
                companyName: 'TLI - TE LO IMPRIMO',
                rif: 'J-XXXXXXXX-X',
                email: 'teloimprimooficial@gmail.com',
                website: 'www.teloimprimooficial.com'
            });
            const [currentQuote, setCurrentQuote] = useState(null);

            // Restaurar presupuesto temporal si existe
            useEffect(() => {
                const tempQuote = sessionStorage.getItem('tempQuote');
                if (tempQuote) {
                    try {
                        const parsedQuote = JSON.parse(tempQuote);
                        setCurrentQuote(parsedQuote);
                        setView('quote');
                        // No eliminar aún, lo haremos cuando seleccionen el cliente
                    } catch (e) {
                        sessionStorage.removeItem('tempQuote');
                    }
                }
            }, []);

            // Load data from Firebase
            useEffect(() => {
                if (!user) return;

                // Load clients
                const unsubClients = db.collection('clients')
                    .onSnapshot(snapshot => {
                        const clientsData = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setClients(clientsData);
                    });

                // Load quotes and migrate old statuses
                const unsubQuotes = db.collection('quotes')
                    .onSnapshot(snapshot => {
                        const quotesData = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));

                        // Migrar estados antiguos: borrador→pendiente, pagado→aceptado
                        quotesData.forEach(async (quote) => {
                            let newStatus = null;
                            if (!quote.status || quote.status === 'borrador') newStatus = 'pendiente';
                            else if (quote.status === 'pagado') newStatus = 'aceptado';
                            if (newStatus) {
                                await db.collection('quotes').doc(quote.id).update({ status: newStatus });
                            }
                        });

                        setQuotes(quotesData);
                    });

                // Load tasks
                const unsubTasks = db.collection('tasks')
                    .onSnapshot(snapshot => {
                        const tasksData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setTasks(tasksData);
                    });

                // Load config
                const unsubConfig = db.collection('config')
                    .doc('company')
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            setConfig(prev => ({ ...prev, ...doc.data() }));
                        }
                    });

                // Load expenses
                const unsubExpenses = db.collection('expenses')
                    .onSnapshot(snapshot => {
                        setExpenses(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                // Load inventory materials
                const unsubMaterials = db.collection('inventory')
                    .onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setMaterials(data.sort((a,b) => (a.name||'').localeCompare(b.name||'')));
                    });

                // Load products (APU)
                const unsubProducts = db.collection('products')
                    .onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setProducts(data.sort((a,b) => (a.name||'').localeCompare(b.name||'')));
                    });

                return () => {
                    unsubClients();
                    unsubQuotes();
                    unsubConfig();
                    unsubTasks();
                    unsubExpenses();
                    unsubMaterials();
                    unsubProducts();
                };
            }, [user]);

            // Save functions
            const saveClient = async (client) => {
                if (client.id) {
                    const { id, ...data } = client;
                    await db.collection('clients').doc(id).update(data);
                } else {
                    await db.collection('clients').add({ ...client, createdAt: new Date().toISOString() });
                }
            };

            const deleteClient = async (clientId) => {
                if (window.confirm('¿Estás seguro de eliminar este cliente?')) {
                    await db.collection('clients').doc(clientId).delete();
                }
            };

            // Elimina valores que Firestore rechaza: undefined, NaN, Infinity
            const cleanForFirestore = (obj) => {
                if (obj === null || obj === undefined) return null;
                const clean = {};
                Object.entries(obj).forEach(([k, v]) => {
                    if (v === undefined) return;
                    if (typeof v === 'number' && !isFinite(v)) { clean[k] = 0; return; }
                    if (v !== null && typeof v === 'object' && !Array.isArray(v) && !(v instanceof Date)) {
                        clean[k] = cleanForFirestore(v);
                    } else if (Array.isArray(v)) {
                        clean[k] = v.map(item =>
                            (item !== null && typeof item === 'object') ? cleanForFirestore(item)
                            : (item === undefined ? '' : (typeof item === 'number' && !isFinite(item) ? 0 : item))
                        );
                    } else {
                        clean[k] = v;
                    }
                });
                return clean;
            };

            const saveQuote = async (quote) => {
                try {
                if (!quote.status) {
                    quote.status = 'borrador';
                }

                const { id, ...data } = quote;
                const cleanData = cleanForFirestore(data);

                let quoteId = id;
                if (id) {
                    await db.collection('quotes').doc(id).update(cleanData);
                } else {
                    const ref = await db.collection('quotes').add(cleanData);
                    quoteId = ref.id;
                }

                // Sincronizar tarea de entrega
                const taskRef = db.collection('tasks').doc(`delivery-${quoteId}`);
                const isAccepted = quote.status === 'aceptado' || quote.status === 'cobrado';
                if (!isAccepted) {
                    const taskDoc = await taskRef.get();
                    if (taskDoc.exists) await taskRef.delete();
                } else {
                    const d = quote.deliveryDate;
                    const isoDate = d
                        ? (d.includes('/') ? (() => { const [day,month,year] = d.split('/'); return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`; })() : d)
                        : '';
                    const clientName = quote.client?.name;
                    const taskTitle = `Entrega: ${quote.number}${clientName ? ' — ' + clientName : ''}`;
                    const itemsSummary = (quote.items || []).filter(i => i.description?.trim()).map(i => i.description.trim()).join(' · ');
                    const taskDoc = await taskRef.get();
                    if (!taskDoc.exists) {
                        await taskRef.set({
                            title: taskTitle,
                            dueDate: isoDate,
                            status: 'pendiente',
                            priority: 'normal',
                            responsible: '',
                            notes: `Presupuesto N° ${quote.number}`,
                            itemsSummary,
                            quoteId,
                            type: 'entrega',
                            createdAt: new Date().toISOString()
                        });
                    } else {
                        await taskRef.update({ title: taskTitle, dueDate: isoDate, notes: `Presupuesto N° ${quote.number}`, itemsSummary });
                    }
                }
                } catch (err) {
                    console.error('Error al guardar presupuesto:', err);
                    toast('Error al guardar. Revisá los datos e intentá de nuevo.', 'error');
                    throw err;
                }
            };

            const deleteQuote = async (quoteId) => {
                if (window.confirm('¿Estás seguro de eliminar este presupuesto?')) {
                    await db.collection('quotes').doc(quoteId).delete();
                    const taskRef = db.collection('tasks').doc(`delivery-${quoteId}`);
                    const taskDoc = await taskRef.get();
                    if (taskDoc.exists) await taskRef.delete();
                    toast('Presupuesto eliminado');
                }
            };

            const duplicateQuote = async (quote) => {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day   = String(now.getDate()).padStart(2, '0');
                const prefix = `${year}-${month}${day}`;
                const count = quotes.filter(q => (q.number || '').startsWith(prefix)).length;
                const { id, ...data } = quote;
                const newQuote = {
                    ...data,
                    number: `${prefix}${count + 1}`,
                    date: `${day}/${month}/${year}`,
                    deliveryDate: '',
                    validUntil: '',
                    status: 'pendiente',
                    createdAt: new Date().toISOString()
                };
                const ref = await db.collection('quotes').add(newQuote);
                setCurrentQuote({ ...newQuote, id: ref.id });
                setView('quote');
                toast('Presupuesto duplicado');
            };

            const updateQuoteStatus = async (quoteId, newStatus) => {
                await db.collection('quotes').doc(quoteId).update({ status: newStatus });
                const taskRef = db.collection('tasks').doc(`delivery-${quoteId}`);
                if (newStatus === 'aceptado' || newStatus === 'cobrado') {
                    const taskDoc = await taskRef.get();
                    if (!taskDoc.exists) {
                        const quote = quotes.find(q => q.id === quoteId);
                        if (quote) {
                            const d = quote.deliveryDate;
                            const isoDate = d
                                ? (d.includes('/') ? (() => { const [day,month,year] = d.split('/'); return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`; })() : d)
                                : '';
                            const clientName = quote.client?.name;
                            const taskTitle = `Entrega: ${quote.number}${clientName ? ' — ' + clientName : ''}`;
                            const itemsSummary = (quote.items || []).filter(i => i.description?.trim()).map(i => i.description.trim()).join(' · ');
                            await taskRef.set({
                                title: taskTitle,
                                dueDate: isoDate,
                                status: 'pendiente',
                                priority: 'normal',
                                responsible: '',
                                notes: `Presupuesto N° ${quote.number}`,
                                itemsSummary,
                                quoteId,
                                type: 'entrega',
                                createdAt: new Date().toISOString()
                            });
                        }
                    }
                } else {
                    const taskDoc = await taskRef.get();
                    if (taskDoc.exists) await taskRef.delete();
                }
            };

            const saveConfigData = async (configData) => {
                await db.collection('config').doc('company').set(configData);
                setConfig(configData);
            };

            const saveTask = async (task) => {
                if (task.id) {
                    const { id, ...data } = task;
                    await db.collection('tasks').doc(id).update(data);
                } else {
                    await db.collection('tasks').add({ ...task, createdAt: new Date().toISOString() });
                }
            };

            const deleteTask = async (taskId) => {
                if (window.confirm('¿Eliminar esta tarea?')) {
                    await db.collection('tasks').doc(taskId).delete();
                }
            };

            const saveExpense = async (expense) => {
                await db.collection('expenses').add({ ...expense, createdAt: new Date().toISOString() });
                toast('Gasto registrado');
            };

            const deleteExpense = async (expenseId) => {
                if (window.confirm('¿Eliminar este gasto?')) {
                    await db.collection('expenses').doc(expenseId).delete();
                    toast('Gasto eliminado');
                }
            };

            const saveMaterial = async (material) => {
                const clean = cleanForFirestore(material);
                if (clean.id) {
                    const { id, ...data } = clean;
                    await db.collection('inventory').doc(id).update(data);
                    toast('Material actualizado');
                } else {
                    await db.collection('inventory').add({ ...clean, createdAt: new Date().toISOString() });
                    toast('Material guardado');
                }
            };

            const deleteMaterial = async (id) => {
                if (window.confirm('¿Eliminar este material?')) {
                    await db.collection('inventory').doc(id).delete();
                    toast('Material eliminado');
                }
            };

            const saveProduct = async (product) => {
                const clean = cleanForFirestore(product);
                if (clean.id) {
                    const { id, ...data } = clean;
                    await db.collection('products').doc(id).update(data);
                    toast('Producto actualizado');
                } else {
                    await db.collection('products').add({ ...clean, createdAt: new Date().toISOString() });
                    toast('Producto guardado');
                }
            };

            const deleteProduct = async (id) => {
                if (window.confirm('¿Eliminar este producto?')) {
                    await db.collection('products').doc(id).delete();
                    toast('Producto eliminado');
                }
            };

            const updateTaskStatus = async (taskId, newStatus) => {
                await db.collection('tasks').doc(taskId).update({ status: newStatus });
            };

            const addPaymentToQuote = async (quoteId, payment) => {
                const quote = quotes.find(q => q.id === quoteId);
                if (!quote) return;
                const payments = [...(quote.payments||[]), payment];
                await db.collection('quotes').doc(quoteId).update({ payments });
                const sub = (quote.items||[]).reduce((s,i) => s + ((i.quantity||0)*(i.unitPrice||0)), 0);
                const total = quote.includeIva ? sub * 1.16 : sub;
                const paid = payments.reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
                if (paid >= total - 0.001 && quote.status === 'aceptado') {
                    await db.collection('quotes').doc(quoteId).update({ status: 'cobrado' });
                    toast('Pago completo. Presupuesto marcado como Cobrado.');
                } else {
                    toast('Pago registrado');
                }
            };

            const deletePaymentFromQuote = async (quoteId, paymentId) => {
                const quote = quotes.find(q => q.id === quoteId);
                if (!quote) return;
                const payments = (quote.payments||[]).filter(p => p.id !== paymentId);
                await db.collection('quotes').doc(quoteId).update({ payments });
                toast('Pago eliminado');
            };

            // Limpieza automática: elimina tareas de entrega de presupuestos rechazados
            useEffect(() => {
                if (!quotes.length || !tasks.length) return;
                const rejectedIds = new Set(quotes.filter(q => q.status === 'rechazado').map(q => q.id));
                tasks.forEach(t => {
                    if (t.type === 'entrega' && t.quoteId && rejectedIds.has(t.quoteId)) {
                        db.collection('tasks').doc(t.id).delete();
                    }
                });
            }, [quotes, tasks]);

            const pendingTasksCount = tasks.filter(t => t.status !== 'completada').length;

            const pendingPaymentsCount = quotes.filter(q => {
                if (q.status !== 'aceptado') return false;
                const sub = (q.items||[]).reduce((s,i) => s + ((i.quantity||0)*(i.unitPrice||0)), 0);
                const total = q.includeIva ? sub * 1.16 : sub;
                const paid = (q.payments||[]).reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
                return total > 0 && paid < total - 0.001;
            }).length;

            const [clientFormTrigger, setClientFormTrigger] = useState(0);
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const newClientsCount = clients.filter(c => c.createdAt && new Date(c.createdAt) >= startOfMonth).length;

            const handleNavigate = (id) => {
                setSidebarOpen(false);
                if (id === 'quote-new') { setCurrentQuote(null); setView('quote'); }
                else if (id === 'clients-new') { setClientFormTrigger(t => t + 1); setView('clients'); }
                else setView(id);
            };

            return (
                <div className="flex min-h-screen bg-slate-50">
                    <Sidebar
                        view={view}
                        onNavigate={handleNavigate}
                        user={user}
                        onLogout={onLogout}
                        pendingTasksCount={pendingTasksCount}
                        newClientsCount={newClientsCount}
                        pendingPaymentsCount={pendingPaymentsCount}
                        open={sidebarOpen}
                        onClose={() => setSidebarOpen(false)}

        // Función para normalizar fechas (soporta múltiples formatos)
        function parseQuoteDate(dateStr) {
            if (!dateStr) return null;
            
            // Si ya es un objeto Date, retornarlo
            if (dateStr instanceof Date) return dateStr;
            
            // Formato ISO: "2026-02-01" o "2026-2-1"
            if (dateStr.match(/^\d{4}-\d{1,2}-\d{1,2}$/)) {
                const [year, month, day] = dateStr.split('-').map(Number);
                return new Date(year, month - 1, day); // month - 1 porque Date usa 0-11
            }
            
            // Formato DD/MM/YYYY: "01/02/2026" o "1/2/2026"
            if (dateStr.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)) {
                const [day, month, year] = dateStr.split('/').map(Number);
                return new Date(year, month - 1, day); // month - 1 porque Date usa 0-11
            }
            
            // Fallback: intentar parsear con Date
            return new Date(dateStr);
        }

            const runMigration = async () => {

                setImporting('migrating');
                let ok = 0;
                try {
                    for (const m of materials) {
                        if (m.calcMode) { ok++; continue; } // ya migrado
                        let update = { calcMode: 'unit' };
                        if (m.supplier === 'Vecxel') {
                            const dim = vecxelDims.find(d => m.name.includes(d.pattern));
                            update = { calcMode:'area', sheetW: dim?.sheetW||122, sheetH: dim?.sheetH||244 };
                        } else if (m.supplier === 'Digital Print 2' && m.name !== 'Estampado') {
                            const vw = Object.entries(vinylWidthMap).find(([k]) => m.name.includes(k));
                            update = { calcMode:'vinyl', vinylWidth: vw ? vw[1] : 137 };
                        }
                        await db.collection('inventory').doc(m.id).update(update);
                        ok++;
                    }
                    toast(`✅ ${ok} materiales migrados`);

                ingr[i] = { ...ingr[i], [field]: val };
                return { ...f, ingredients: ingr };
            });

            const calcIngredientCost = (ing, mat) => {
                if (!mat) return 0;
                const cost = parseFloat(mat.costUsd)||0;
                const mode = mat.calcMode || 'unit';
                if (mode === 'area') {
                    const sheetArea = (parseFloat(mat.sheetW)||1) * (parseFloat(mat.sheetH)||1);
                    const pieceArea = (parseFloat(ing.pieceW)||0) * (parseFloat(ing.pieceH)||0);
                    return sheetArea > 0 ? (pieceArea / sheetArea) * cost : 0;
                }
                if (mode === 'vinyl') {
                    // costo por m², ancho fijo en cm, alto variable en cm
                    const w = (parseFloat(mat.vinylWidth)||137) / 100; // a metros
                    const h = (parseFloat(ing.vinylH)||0) / 100;       // a metros
                    return w * h * cost;
                }
                // unit
                return cost * (parseFloat(ing.qty)||0);
            };

                }, 0);
            };

                const cost = calcCost(ingredients);

                return cost / (1 - (parseFloat(marginPct)||0) / 100);

        // ─── END INVENTORY VIEW ───────────────────────────────────────────────────

        function ExpensesView({ quotes, expenses, config, onSave, onDelete }) {
            const CATEGORIES = ['Materiales','Proveedor','Tercero','Servicios','Transporte','Nómina','Alquiler','Otro'];
            const CAT_COLORS = {
                Materiales: 'bg-blue-100 text-blue-700',
                Proveedor:  'bg-purple-100 text-purple-700',
                Tercero:    'bg-indigo-100 text-indigo-700',
                Servicios:  'bg-cyan-100 text-cyan-700',
                Transporte: 'bg-amber-100 text-amber-700',
                Nómina:     'bg-emerald-100 text-emerald-700',
                Alquiler:   'bg-orange-100 text-orange-700',
                Otro:       'bg-slate-100 text-slate-600',
            };

            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            const mesesNombres = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

            const [selectedMonth, setSelectedMonth] = useState('current');
            const [catFilter, setCatFilter] = useState('todas');
            const [search, setSearch] = useState('');
            const [showForm, setShowForm] = useState(false);
            const [saving, setSaving] = useState(false);
            const [currency, setCurrency] = useState('USD');
            const bcvRate = config?.bcvRate || 0;
            const emptyForm = { date: now.toISOString().slice(0,10), amount: '', category: 'Materiales', description: '', to: '' };
            const [form, setForm] = useState(emptyForm);

            const matchMonth = (dateStr) => {
                if (!dateStr) return false;
                const d = new Date(dateStr + 'T00:00:00');
                if (selectedMonth === 'current') return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
                if (selectedMonth === 'all') return true;
                const [y, m] = selectedMonth.split('-');
                return d.getFullYear() === parseInt(y) && d.getMonth() === parseInt(m);
            };

            const periodExpenses = expenses.filter(e => matchMonth(e.date));
            const totalGastos = periodExpenses.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);

            const totalIngresos = quotes
                .filter(q => (q.status === 'aceptado' || q.status === 'cobrado' || q.status === 'pagado') && q.date)
                .filter(q => {
                    const d = parseQuoteDate(q.date);
                    if (!d) return false;
                    if (selectedMonth === 'current') return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
                    if (selectedMonth === 'all') return true;
                    const [y, m] = selectedMonth.split('-');
                    return d.getFullYear() === parseInt(y) && d.getMonth() === parseInt(m);
                })
                .reduce((s, q) => s + ((q.items||[]).reduce((si,i) => si + ((i.quantity||0)*(i.unitPrice||0)), 0)), 0);

            const resultado = totalIngresos - totalGastos;

            let shown = periodExpenses;
            if (catFilter !== 'todas') shown = shown.filter(e => e.category === catFilter);
            if (search) {
                const s = search.toLowerCase();
                shown = shown.filter(e => e.description?.toLowerCase().includes(s) || e.to?.toLowerCase().includes(s));
            }
            shown = [...shown].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

            const monthOptions = [];
            const oldestDate = expenses.reduce((o, e) => (!e.date ? o : (!o || e.date < o ? e.date : o)), null);
            if (oldestDate) {
                const start = new Date(oldestDate + 'T00:00:00');
                let d = new Date(start.getFullYear(), start.getMonth(), 1);
                const end = new Date();
                while (d <= end) {
                    monthOptions.unshift({ value: `${d.getFullYear()}-${d.getMonth()}`, label: `${mesesNombres[d.getMonth()]} ${d.getFullYear()}` });
                    d.setMonth(d.getMonth() + 1);
                }
            }

            const handleSave = async () => {
                if (!form.amount || isNaN(parseFloat(form.amount)) || parseFloat(form.amount) <= 0) {
                    toast('Ingresá un monto válido', 'warning'); return;
                }
                if (!form.description.trim()) {
                    toast('Ingresá una descripción', 'warning'); return;
                }
                if (currency === 'VES' && bcvRate <= 0) {
                    toast('Configurá la tasa BCV en Configuración antes de registrar en Bs', 'warning'); return;
                }
                setSaving(true);
                try {
                    const rawAmount = parseFloat(form.amount);
                    const amountUSD = currency === 'VES' ? rawAmount / bcvRate : rawAmount;
                    const expenseData = {
                        ...form,
                        amount: parseFloat(amountUSD.toFixed(4)),
                        currency,
                        ...(currency === 'VES' && { originalAmountBs: rawAmount, bcvRateUsed: bcvRate }),
                    };
                    await onSave(expenseData);
                    setForm(emptyForm);
                    setCurrency('USD');
                    setShowForm(false);
                } finally { setSaving(false); }
            };

            const periodLabel = selectedMonth === 'current'
                ? `${mesesNombres[currentMonth]} ${currentYear}`
                : selectedMonth === 'all' ? `Todo ${currentYear}`
                : (() => { const [y,m] = selectedMonth.split('-'); return `${mesesNombres[parseInt(m)]} ${y}`; })();

            return (
                <div className="max-w-4xl mx-auto p-6">
                    <div className="mb-6">
                        <h1 className="text-3xl font-bold text-slate-800">Gastos</h1>
                        <p className="text-slate-500 mt-1">Materiales, proveedores y pagos</p>
                    </div>

                    {/* Summary cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div className="rounded-2xl p-5 text-white" style={{background:'linear-gradient(135deg,#ef4444,#dc2626)'}}>
                            <p className="text-xs font-bold opacity-70 uppercase tracking-widest mb-1">Gastos · {periodLabel}</p>
                            <p className="text-3xl font-extrabold">${totalGastos.toFixed(2)}</p>
                            <p className="text-xs opacity-60 mt-1">{periodExpenses.length} registro{periodExpenses.length !== 1 ? 's' : ''}</p>
                        </div>
                        <div className="rounded-2xl p-5 text-white" style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)'}}>
                            <p className="text-xs font-bold opacity-70 uppercase tracking-widest mb-1">Generado · {periodLabel}</p>
                            <p className="text-3xl font-extrabold">${totalIngresos.toFixed(2)}</p>
                            <p className="text-xs opacity-60 mt-1">sin IVA · aceptados</p>
                        </div>
                        <div className="rounded-2xl p-5 text-white" style={{background: resultado >= 0 ? 'linear-gradient(135deg,#10b981,#059669)' : 'linear-gradient(135deg,#f59e0b,#d97706)'}}>
                            <p className="text-xs font-bold opacity-70 uppercase tracking-widest mb-1">Resultado neto</p>
                            <p className="text-3xl font-extrabold">{resultado < 0 ? '-' : ''}${Math.abs(resultado).toFixed(2)}</p>
                            <p className="text-xs opacity-60 mt-1">{resultado >= 0 ? 'Positivo' : 'Negativo'}</p>
                        </div>
                    </div>

                    {/* Filters + add button */}
                    <div className="flex flex-wrap gap-3 mb-4 items-center">
                        <input value={search} onChange={e => setSearch(e.target.value)}
                            placeholder="Buscar descripción o proveedor..."
                            className="flex-1 min-w-40 px-4 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-red-300"/>
                        <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}
                            className="px-3 py-2 border border-slate-200 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-red-300">
                            <option value="current">Mes actual</option>
                            <option value="all">Todo {currentYear}</option>
                            {monthOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                        </select>
                        <button onClick={() => { setShowForm(true); setForm(emptyForm); }}
                            className="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white rounded-xl"
                            style={{background:'linear-gradient(135deg,#ef4444,#dc2626)'}}>
                            <Icons.Plus className="w-4 h-4"/>Nuevo gasto
                        </button>
                    </div>

                    {/* Category pills */}
                    <div className="flex flex-wrap gap-1.5 mb-5">
                        {['todas', ...CATEGORIES].map(cat => (
                            <button key={cat} onClick={() => setCatFilter(cat)}
                                className={`px-3 py-1 rounded-lg text-xs font-semibold transition-all ${catFilter === cat ? 'bg-slate-700 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                {cat === 'todas' ? 'Todas' : cat}
                            </button>
                        ))}
                    </div>

                    {/* Add form */}
                    {showForm && (
                        <div className="bg-red-50 border border-red-100 rounded-2xl p-4 mb-5">
                            <h3 className="text-sm font-bold text-slate-700 mb-3">Nuevo gasto</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label className="text-xs font-semibold text-slate-500 mb-1 block">Descripción *</label>
                                    <input value={form.description} onChange={e => setForm(f => ({...f, description: e.target.value}))}
                                        placeholder="Ej: Papel bond A4, tinta negra..."
                                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-red-300"/>
                                </div>
                                <div>
                                    <label className="text-xs font-semibold text-slate-500 mb-1 block">A quién se pagó</label>
                                    <input value={form.to} onChange={e => setForm(f => ({...f, to: e.target.value}))}
                                        placeholder="Proveedor, persona, empresa..."
                                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-red-300"/>
                                </div>
                                <div>
                                    <label className="text-xs font-semibold text-slate-500 mb-1 block">Monto *</label>
                                    <div className="flex gap-2">
                                        <div className="flex rounded-xl border border-slate-200 overflow-hidden flex-shrink-0 text-xs font-bold">
                                            <button type="button" onClick={() => setCurrency('USD')}
                                                className={`px-3 py-2 transition-colors ${currency === 'USD' ? 'bg-slate-700 text-white' : 'bg-white text-slate-500 hover:bg-slate-50'}`}>
                                                $ USD
                                            </button>
                                            <button type="button" onClick={() => setCurrency('VES')}
                                                className={`px-3 py-2 transition-colors ${currency === 'VES' ? 'bg-slate-700 text-white' : 'bg-white text-slate-500 hover:bg-slate-50'}`}>
                                                Bs
                                            </button>
                                        </div>
                                        <input type="number" value={form.amount} onChange={e => setForm(f => ({...f, amount: e.target.value}))}
                                            placeholder={currency === 'VES' ? 'Monto en Bs' : '0.00'}
                                            className="flex-1 px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-red-300"/>
                                    </div>
                                    {currency === 'VES' && form.amount && bcvRate > 0 && (
                                        <p className="text-xs text-emerald-600 mt-1 font-semibold">
                                            ≈ ${(parseFloat(form.amount) / bcvRate).toFixed(2)} USD · Tasa: Bs {bcvRate.toFixed(2)}
                                        </p>
                                    )}
                                    {currency === 'VES' && bcvRate <= 0 && (
                                        <p className="text-xs text-amber-600 mt-1">⚠ Configura la tasa BCV en Configuración primero</p>
                                    )}
                                </div>
                                <div>
                                    <label className="text-xs font-semibold text-slate-500 mb-1 block">Fecha *</label>
                                    <input type="date" value={form.date} onChange={e => setForm(f => ({...f, date: e.target.value}))}
                                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-red-300"/>
                                </div>
                                <div>
                                    <label className="text-xs font-semibold text-slate-500 mb-1 block">Categoría *</label>
                                    <select value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))}
                                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-red-300 bg-white">
                                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="flex gap-2 justify-end">
                                <button onClick={() => setShowForm(false)}
                                    className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-xl transition-colors">
                                    Cancelar
                                </button>
                                <button onClick={handleSave} disabled={saving}
                                    className="px-5 py-2 text-sm font-semibold text-white rounded-xl disabled:opacity-50"
                                    style={{background:'linear-gradient(135deg,#ef4444,#dc2626)'}}>
                                    {saving ? 'Guardando...' : 'Guardar gasto'}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Expense list */}
                    <div className="space-y-2">
                        {shown.length === 0 && (
                            <div className="text-center py-16 text-slate-400">
                                <p className="text-5xl mb-3">🧾</p>
                                <p className="font-semibold">No hay gastos en este período</p>
                            </div>
                        )}
                        {shown.map(exp => (
                            <div key={exp.id} className="bg-white border border-slate-100 rounded-2xl shadow-sm px-4 py-3 flex items-center gap-4">
                                <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-2 flex-wrap">
                                        <span className="font-semibold text-slate-800 text-sm">{exp.description}</span>
                                        <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${CAT_COLORS[exp.category] || 'bg-slate-100 text-slate-600'}`}>{exp.category}</span>
                                    </div>
                                    <div className="flex items-center gap-3 mt-0.5">
                                        {exp.to && <span className="text-xs text-slate-400">{exp.to}</span>}
                                        <span className="text-xs text-slate-400">{exp.date}</span>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3 flex-shrink-0">
                                    <div className="text-right">
                                        <span className="font-bold text-red-600">${parseFloat(exp.amount).toFixed(2)}</span>
                                        {exp.currency === 'VES' && exp.originalAmountBs && (
                                            <p className="text-xs text-slate-400">Bs {parseFloat(exp.originalAmountBs).toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits:2})}</p>
                                        )}
                                    </div>
                                    <button onClick={() => onDelete(exp.id)}
                                        className="p-1.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                                        <Icons.Trash2 className="w-4 h-4"/>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Dashboard Component
        function Dashboard({ quotes, tasks = [], expenses = [], onViewQuote, onDeleteQuote, onUpdateStatus }) {
            const [selectedMonth, setSelectedMonth] = useState('current');
            const [listSearch, setListSearch] = useState('');
            const [listStatus, setListStatus] = useState('all');
            const [listSort, setListSort] = useState('date-desc');
            
            // Obtener fecha actual
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            
            // Calcular presupuestos del mes actual (para el caso 'current')
            const currentMonthQuotes = quotes.filter(q => {
                if (!q.date) return false;
                const quoteDate = parseQuoteDate(q.date);
                if (!quoteDate) return false;
                return quoteDate.getFullYear() === currentYear && quoteDate.getMonth() === currentMonth;
            });
            
            // MODIFICACIÓN CLAVE: Filtrar presupuestos según el filtro seleccionado
            const filteredQuotes = selectedMonth === 'current' 
                ? currentMonthQuotes 
                : selectedMonth === 'all'
                ? quotes
                : quotes.filter(q => {
                    if (!q.date) return false;
                    const quoteDate = parseQuoteDate(q.date);
                    if (!quoteDate) return false;
                    const [year, month] = selectedMonth.split('-');
                    return quoteDate.getFullYear() === parseInt(year) && quoteDate.getMonth() === parseInt(month);
                });
            
            // Estadísticas con nuevos estados
            const pendienteCount = filteredQuotes.filter(q => !q.status || q.status === 'pendiente' || q.status === 'borrador').length;
            const enviadoCount = filteredQuotes.filter(q => q.status === 'enviado').length;
            const aceptadoCount = filteredQuotes.filter(q => q.status === 'aceptado' || q.status === 'cobrado' || q.status === 'pagado').length;
            const rechazadoCount = filteredQuotes.filter(q => q.status === 'rechazado').length;

            // Calcular total vendido (sin IVA, solo presupuestos aceptados) - ahora dinámico
            const totalVendido = filteredQuotes
                .filter(q => q.status === 'aceptado' || q.status === 'cobrado' || q.status === 'pagado')
                .reduce((sum, q) => {
                    const subtotal = q.items?.reduce((itemSum, item) => {
                        return itemSum + ((item.quantity || 0) * (item.unitPrice || 0));
                    }, 0) || 0;
                    return sum + subtotal;
                }, 0);
            
            // Efectividad: aceptados vs total
            const totalPresupuestos = filteredQuotes.length;
            const efectividadPorcentaje = totalPresupuestos > 0
                ? ((aceptadoCount / totalPresupuestos) * 100).toFixed(1)
                : 0;

            // Tasa de conversión (enviados a aceptados)
            const conversionRate = enviadoCount > 0 ? ((aceptadoCount / enviadoCount) * 100).toFixed(1) : 0;
            
            // NUEVO: Calcular presupuestos pendientes de seguimiento
            const calculateDaysSince = (dateStr) => {
                if (!dateStr) return 0;
                const quoteDate = parseQuoteDate(dateStr);
                if (!quoteDate) return 0;
                const diffTime = Math.abs(now - quoteDate);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return diffDays;
            };
            
            const pendingFollowUp = quotes
                .filter(q => q.status === 'enviado') // Solo los enviados
                .map(q => ({
                    ...q,
                    daysSince: calculateDaysSince(q.date)
                }))
                .sort((a, b) => b.daysSince - a.daysSince); // Más antiguos primero
            
            // Categorizar por urgencia
            const urgentFollowUp = pendingFollowUp.filter(q => q.daysSince >= 7); // 7+ días
            const recentFollowUp = pendingFollowUp.filter(q => q.daysSince >= 3 && q.daysSince < 7); // 3-6 días
            
            // Datos para el gráfico anual
            const mesesNombres = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            const ventasPorMes = Array(12).fill(0);
            
            quotes.filter(q => q.status === 'aceptado' || q.status === 'cobrado' || q.status === 'pagado').forEach(q => {
                if (!q.date) return;
                const quoteDate = parseQuoteDate(q.date);
                if (!quoteDate) return;
                if (quoteDate.getFullYear() === currentYear) {
                    const mes = quoteDate.getMonth();
                    const subtotal = q.items?.reduce((sum, item) => {
                        return sum + ((item.quantity || 0) * (item.unitPrice || 0));
                    }, 0) || 0;
                    ventasPorMes[mes] += subtotal;
                }
            });
            
            const maxVenta = Math.max(...ventasPorMes, 1);
            
            // Generar opciones de meses
            const monthOptions = [];
            const oldestQuote = quotes.reduce((oldest, q) => {
                if (!q.date) return oldest;
                const qDate = parseQuoteDate(q.date);
                if (!qDate) return oldest;
                return !oldest || qDate < oldest ? qDate : oldest;
            }, null);
            
            if (oldestQuote) {
                let date = new Date(oldestQuote);
                const endDate = new Date();
                while (date <= endDate) {
                    const year = date.getFullYear();
                    const month = date.getMonth();
                    monthOptions.unshift({
                        value: `${year}-${month}`,
                        label: `${mesesNombres[month]} ${year}`
                    });
                    date.setMonth(date.getMonth() + 1);
                }
            }
            
            let displayedQuotes = filteredQuotes;
            if (listSearch) {
                const s = listSearch.toLowerCase();
                displayedQuotes = displayedQuotes.filter(q =>
                    q.client?.name?.toLowerCase().includes(s) ||
                    q.number?.toLowerCase().includes(s)
                );
            }
            if (listStatus !== 'all') {
                displayedQuotes = displayedQuotes.filter(q => (q.status || 'pendiente') === listStatus);
            }
            displayedQuotes = [...displayedQuotes].sort((a, b) => {
                switch(listSort) {
                    case 'date-asc':    return parseQuoteDate(a.date) - parseQuoteDate(b.date);
                    case 'number-asc':  return (a.number||'').localeCompare(b.number||'');
                    case 'number-desc': return (b.number||'').localeCompare(a.number||'');
                    case 'status':      return (a.status||'pendiente').localeCompare(b.status||'pendiente');
                    default:            return parseQuoteDate(b.date) - parseQuoteDate(a.date);
                }
            });

            return (
                <div className="max-w-7xl mx-auto p-6">
                    {/* Header */}
                    <div className="mb-6">
                        <h1 className="text-3xl font-bold text-slate-800">Dashboard</h1>
                        <p className="text-slate-600 mt-1">
                            {selectedMonth === 'current' 
                                ? `${mesesNombres[currentMonth]} ${currentYear}` 
                                : selectedMonth === 'all'
                                ? `Todo el año ${currentYear}`
                                : (() => {
                                    const [year, month] = selectedMonth.split('-');
                                    return `${mesesNombres[parseInt(month)]} ${year}`;
                                })()
                            }
                        </p>
                    </div>
                    
                    {/* Hero: Total vendido + Efectividad */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div className="md:col-span-2 rounded-2xl p-6 text-white card-hover" style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)'}}>
                            <p className="text-xs font-bold opacity-70 uppercase tracking-widest mb-2">Total vendido · {selectedMonth === 'current' ? `${mesesNombres[currentMonth]} ${currentYear}` : selectedMonth === 'all' ? `Año ${currentYear}` : (() => { const [y,m] = selectedMonth.split('-'); return `${mesesNombres[parseInt(m)]} ${y}`; })()}</p>
                            <p className="text-5xl font-extrabold tracking-tight mb-1">${totalVendido.toFixed(2)}</p>
                            <p className="text-sm opacity-60">{aceptadoCount} presupuesto{aceptadoCount!==1?'s':''} cerrado{aceptadoCount!==1?'s':''} · sin IVA</p>
                        </div>
                        <div className="rounded-2xl p-6 text-white card-hover" style={{background:'linear-gradient(135deg,#8b5cf6,#ec4899)'}}>
                            <p className="text-xs font-bold opacity-70 uppercase tracking-widest mb-2">Efectividad</p>
                            <p className="text-5xl font-extrabold tracking-tight mb-1">{efectividadPorcentaje}%</p>
                            <p className="text-sm opacity-60">{aceptadoCount} de {totalPresupuestos} presupuestos</p>
                        </div>
                    </div>

                    {/* Resultado financiero */}
                    {(() => {
                        const gastosDelPeriodo = expenses.filter(e => {
                            if (!e.date) return false;
                            const d = new Date(e.date + 'T00:00:00');
                            if (selectedMonth === 'current') return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
                            if (selectedMonth === 'all') return true;
                            const [y, m] = selectedMonth.split('-');
                            return d.getFullYear() === parseInt(y) && d.getMonth() === parseInt(m);
                        });
                        const totalGastos = gastosDelPeriodo.reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
                        if (totalGastos === 0) return null;
                        const resultado = totalVendido - totalGastos;
                        return (
                            <div className="grid grid-cols-3 gap-0 mb-5 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                                <div className="text-center p-4">
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Generado</p>
                                    <p className="text-xl font-extrabold text-indigo-600">${totalVendido.toFixed(2)}</p>
                                </div>
                                <div className="text-center p-4 border-x border-slate-100">
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Gastos</p>
                                    <p className="text-xl font-extrabold text-red-500">-${totalGastos.toFixed(2)}</p>
                                </div>
                                <div className="text-center p-4">
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Resultado</p>
                                    <p className={`text-xl font-extrabold ${resultado >= 0 ? 'text-emerald-600' : 'text-amber-600'}`}>{resultado < 0 ? '-' : ''}${Math.abs(resultado).toFixed(2)}</p>
                                </div>
                            </div>
                        );
                    })()}

                    {/* Tarjetas de estado */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                        {[
                            { label:'Pendientes', value:pendienteCount, Icon:Icons.Clock,        light:'bg-amber-50 border-amber-100',   iconBg:'bg-amber-100',   iconColor:'text-amber-600' },
                            { label:'Enviados',   value:enviadoCount,   Icon:Icons.Send,         light:'bg-blue-50 border-blue-100',     iconBg:'bg-blue-100',    iconColor:'text-blue-600'  },
                            { label:'Aceptados',  value:aceptadoCount,  Icon:Icons.CheckCircle,  light:'bg-emerald-50 border-emerald-100',iconBg:'bg-emerald-100', iconColor:'text-emerald-600'},
                            { label:'Rechazados', value:rechazadoCount, Icon:Icons.XCircle,      light:'bg-red-50 border-red-100',       iconBg:'bg-red-100',     iconColor:'text-red-500'   },
                        ].map(s => (
                            <div key={s.label} className={`bg-white rounded-2xl shadow-sm border p-4 card-hover ${s.light}`}>
                                <div className={`${s.iconBg} w-9 h-9 rounded-xl flex items-center justify-center mb-3`}>
                                    <s.Icon className={`w-4 h-4 ${s.iconColor}`}/>
                                </div>
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">{s.label}</p>
                                <p className="text-3xl font-extrabold text-slate-800">{s.value}</p>
                            </div>
                        ))}
                    </div>
                    
                    {/* NUEVO: Widget de Seguimiento */}
                    {pendingFollowUp.length > 0 && (
                        <div className="bg-gradient-to-r from-orange-50 to-red-50 border-l-4 border-orange-500 rounded-lg p-6 mb-8">
                            <div className="flex items-start justify-between mb-4">
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 flex items-center">
                                        <svg className="w-6 h-6 text-orange-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                        Presupuestos Pendientes de Seguimiento
                                    </h3>
                                    <p className="text-sm text-slate-600 mt-1">
                                        {pendingFollowUp.length} presupuesto{pendingFollowUp.length !== 1 ? 's' : ''} enviado{pendingFollowUp.length !== 1 ? 's' : ''} sin respuesta
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    {urgentFollowUp.length > 0 && (
                                        <span className="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-semibold">
                                            {urgentFollowUp.length} Urgente{urgentFollowUp.length !== 1 ? 's' : ''} (7+ días)
                                        </span>
                                    )}
                                    {recentFollowUp.length > 0 && (
                                        <span className="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-semibold">
                                            {recentFollowUp.length} Reciente{recentFollowUp.length !== 1 ? 's' : ''} (3-6 días)
                                        </span>
                                    )}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {pendingFollowUp.slice(0, 6).map(q => {
                                    const subtotal = q.items?.reduce((sum, item) => 
                                        sum + ((item.quantity || 0) * (item.unitPrice || 0)), 0) || 0;
                                    const urgencyColor = q.daysSince >= 7 
                                        ? 'border-red-300 bg-red-50' 
                                        : q.daysSince >= 3 
                                        ? 'border-yellow-300 bg-yellow-50'
                                        : 'border-blue-300 bg-blue-50';
                                    
                                    return (
                                        <div 
                                            key={q.id} 
                                            className={`border-2 ${urgencyColor} rounded-lg p-4 hover:shadow-lg transition-shadow cursor-pointer`}
                                            onClick={() => onViewQuote(q)}
                                        >
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <h4 className="font-bold text-slate-800">{q.number}</h4>
                                                    <p className="text-sm text-slate-600">{q.client?.name || 'Sin cliente'}</p>
                                                </div>
                                                <span className={`px-2 py-1 rounded text-xs font-bold ${
                                                    q.daysSince >= 7 ? 'bg-red-200 text-red-800' :
                                                    q.daysSince >= 3 ? 'bg-yellow-200 text-yellow-800' :
                                                    'bg-blue-200 text-blue-800'
                                                }`}>
                                                    {q.daysSince} día{q.daysSince !== 1 ? 's' : ''}
                                                </span>
                                            </div>
                                            <p className="text-sm text-slate-600 mb-2">

                    {/* Widget de Cobros Pendientes */}

                            const paid = (q.payments||[]).reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
                            return total > 0 && paid < total - 0.001;
                        }).map(q => {
