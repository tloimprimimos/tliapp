        // ─── GLOBAL SEARCH ────────────────────────────────────────────
        function GlobalSearch({ quotes, clients, tasks, onViewQuote, onNavigate }) {
            const [query, setQuery] = useState('');
            const [open, setOpen] = useState(false);
            const inputRef = React.useRef(null);

            const results = React.useMemo(() => {
                const q = query.trim().toLowerCase();
                if (q.length < 2) return [];
                const res = [];
                quotes.filter(x => x.number?.toLowerCase().includes(q) || x.client?.name?.toLowerCase().includes(q))
                    .slice(0, 4).forEach(x => res.push({ type: 'quote', label: `${x.number}${x.client?.name ? ' — ' + x.client.name : ''}`, sub: getStatusConfig(x.status||'pendiente').label, item: x }));
                clients.filter(x => x.name?.toLowerCase().includes(q) || x.rif?.toLowerCase().includes(q) || x.phone?.toLowerCase().includes(q))
                    .slice(0, 3).forEach(x => res.push({ type: 'client', label: x.name, sub: x.rif || x.phone || 'Cliente', item: x }));
                tasks.filter(x => x.title?.toLowerCase().includes(q))
                    .slice(0, 3).forEach(x => res.push({ type: 'task', label: x.title, sub: x.status === 'completada' ? 'Completada' : x.status === 'en_progreso' ? 'En progreso' : 'Pendiente', item: x }));
                return res;
            }, [query, quotes, clients, tasks]);

            const handleSelect = (r) => {
                setQuery(''); setOpen(false);
                if (r.type === 'quote') onViewQuote(r.item);
                else if (r.type === 'client') onNavigate('clients');
                else onNavigate('tasks');
            };

            const typeIcon = { quote: <Icons.FileText className="w-4 h-4 text-indigo-400"/>, client: <Icons.Users className="w-4 h-4 text-emerald-400"/>, task: <Icons.ClipboardList className="w-4 h-4 text-amber-400"/> };
            const typeBg   = { quote: 'bg-indigo-50', client: 'bg-emerald-50', task: 'bg-amber-50' };

            return (
                <div className="relative flex-1 max-w-lg">
                    <div className="relative">
                        <svg className="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <input ref={inputRef} type="text" value={query}
                            onChange={e => { setQuery(e.target.value); setOpen(true); }}
                            onFocus={() => setOpen(true)}
                            onBlur={() => setTimeout(() => setOpen(false), 150)}
                            placeholder="Buscar presupuestos, clientes, tareas..."
                            className="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl bg-slate-50 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"/>
                        {query && (
                            <button onClick={() => { setQuery(''); setOpen(false); }} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                <Icons.XCircle className="w-4 h-4"/>
                            </button>
                        )}
                    </div>
                    {open && results.length > 0 && (
                        <div className="absolute top-full left-0 right-0 mt-1.5 bg-white rounded-xl shadow-xl border border-slate-200 z-50 overflow-hidden">
                            {results.map((r, i) => (
                                <button key={i} onMouseDown={() => handleSelect(r)}
                                    className="w-full text-left px-4 py-2.5 hover:bg-slate-50 flex items-center gap-3 border-b border-slate-50 last:border-0 transition-colors">
                                    <span className={`w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 ${typeBg[r.type]}`}>{typeIcon[r.type]}</span>
                                    <div className="min-w-0">
                                        <p className="text-sm font-semibold text-slate-800 truncate">{r.label}</p>
                                        <p className="text-xs text-slate-400">{r.sub}</p>
                                    </div>
                                </button>
                            ))}
                            {query.length >= 2 && results.length === 0 && (
                                <div className="px-4 py-4 text-center text-sm text-slate-400">Sin resultados para "{query}"</div>
                            )}
                        </div>
                    )}
                    {open && query.length >= 2 && results.length === 0 && (
                        <div className="absolute top-full left-0 right-0 mt-1.5 bg-white rounded-xl shadow-xl border border-slate-200 z-50">
                            <div className="px-4 py-4 text-center text-sm text-slate-400">Sin resultados para "{query}"</div>
                        </div>
                    )}
                </div>
            );
        }

        // ─── TASKS VIEW ───────────────────────────────────────────────
        function TasksView({ tasks, onSave, onDelete, onUpdateStatus, onGoToQuote }) {
            const [showForm, setShowForm] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [filter, setFilter] = useState('activas');
            const emptyForm = { title: '', responsible: '', dueDate: '', priority: 'normal', notes: '', status: 'pendiente' };
            const [formData, setFormData] = useState(emptyForm);
            const [completingTask, setCompletingTask] = useState(null);
            const [completionNote, setCompletionNote] = useState('');

            const now = new Date();
            now.setHours(0,0,0,0);

            const getUrgency = (task) => {
                if (task.status === 'completada') return 'done';
                if (!task.dueDate) return 'ok';
                const d = new Date(task.dueDate);
                d.setHours(0,0,0,0);
                const diff = (d - now) / (1000*60*60*24);
                if (diff < 0) return 'overdue';
                if (diff <= 2) return 'urgent';
                return 'ok';
            };

            const getTaskStatusCfg = (status) => {
                if (status === 'en_progreso') return { label: 'En Progreso', badge: 'bg-blue-100 text-blue-700', next: 'completada', nextLabel: 'Completar' };
                if (status === 'completada') return { label: 'Completada', badge: 'bg-emerald-100 text-emerald-700', next: 'pendiente', nextLabel: 'Reabrir' };
                return { label: 'Pendiente', badge: 'bg-amber-100 text-amber-700', next: 'en_progreso', nextLabel: 'Iniciar' };
            };

            let displayed = tasks;
            if (filter === 'activas') displayed = tasks.filter(t => t.status !== 'completada');
            if (filter === 'completadas') displayed = tasks.filter(t => t.status === 'completada');
            displayed = [...displayed].sort((a,b) => {
                const urgOrder = { overdue: 0, urgent: 1, ok: 2, done: 3 };
                return (urgOrder[getUrgency(a)] || 2) - (urgOrder[getUrgency(b)] || 2);
            });

            const pendingCount = tasks.filter(t => t.status === 'pendiente').length;
            const inProgCount  = tasks.filter(t => t.status === 'en_progreso').length;
            const doneCount    = tasks.filter(t => t.status === 'completada').length;
            const overdueCount = tasks.filter(t => getUrgency(t) === 'overdue').length;

            const openForm = (task = null) => {
                setEditingTask(task);
                setFormData(task ? { ...task } : emptyForm);
                setShowForm(true);
            };

            const handleSave = async () => {
                if (!formData.title.trim()) { toast('Ingresá el título de la tarea', 'warning'); return; }
                await onSave(editingTask ? { ...formData, id: editingTask.id } : formData);
                setShowForm(false);
                setEditingTask(null);
                setFormData(emptyForm);
            };

            return (
                <div className="max-w-4xl mx-auto p-6">
                    {/* Header */}
                    <div className="flex justify-between items-start mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Tareas</h2>
                            <p className="text-slate-500 text-sm mt-0.5">Gestiona el trabajo del equipo</p>
                        </div>
                        <button onClick={() => openForm()}
                            className="flex items-center gap-2 px-4 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium shadow-sm transition text-sm">
                            <Icons.Plus className="w-4 h-4"/>
                            Nueva Tarea
                        </button>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        {[
                            { label: 'Pendientes',   value: pendingCount, color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-100' },
                            { label: 'En Progreso',  value: inProgCount,  color: 'text-blue-600',  bg: 'bg-blue-50',  border: 'border-blue-100' },
                            { label: 'Completadas',  value: doneCount,    color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-100' },
                            { label: 'Vencidas',     value: overdueCount, color: overdueCount > 0 ? 'text-red-600' : 'text-slate-400', bg: overdueCount > 0 ? 'bg-red-50' : 'bg-slate-50', border: overdueCount > 0 ? 'border-red-100' : 'border-slate-100' },
                        ].map(s => (
                            <div key={s.label} className={`${s.bg} border ${s.border} rounded-xl p-4`}>
                                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">{s.label}</p>
                                <p className={`text-3xl font-extrabold ${s.color}`}>{s.value}</p>
                            </div>
                        ))}
                    </div>

                    {/* Form Modal */}
                    {showForm && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => { setShowForm(false); setEditingTask(null); }}>
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold text-slate-800 mb-4 text-lg">{editingTask ? 'Editar Tarea' : 'Nueva Tarea'}</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Título *</label>
                                        <input type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})}
                                            className="w-full px-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Descripción de la tarea..."/>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Responsable</label>
                                        <input type="text" value={formData.responsible} onChange={e => setFormData({...formData, responsible: e.target.value})}
                                            className="w-full px-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Nombre del responsable"/>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Fecha Límite</label>
                                        <input type="date" value={formData.dueDate} onChange={e => setFormData({...formData, dueDate: e.target.value})}
                                            className="w-full px-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Prioridad</label>
                                        <select value={formData.priority} onChange={e => setFormData({...formData, priority: e.target.value})}
                                            className="w-full px-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                            <option value="alta">Alta</option>
                                            <option value="normal">Normal</option>
                                            <option value="baja">Baja</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Estado</label>
                                        <select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}
                                            className="w-full px-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                            <option value="pendiente">Pendiente</option>
                                            <option value="en_progreso">En Progreso</option>
                                            <option value="completada">Completada</option>
                                        </select>
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Notas</label>
                                        <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})}
                                            className="w-full px-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            rows="2" placeholder="Notas adicionales..."/>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => { setShowForm(false); setEditingTask(null); }}
                                        className="px-5 py-2 border border-slate-200 text-slate-700 rounded-xl hover:bg-slate-50 font-medium transition text-sm">
                                        Cancelar
                                    </button>
                                    <button onClick={handleSave}
                                        className="px-5 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium shadow-sm transition text-sm flex items-center gap-2">
                                        <Icons.Save className="w-4 h-4"/>
                                        Guardar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Filter tabs */}
                    <div className="flex gap-2 mb-5">
                        {[['activas','Activas'],['completadas','Completadas'],['todas','Todas']].map(([val, lbl]) => (
                            <button key={val} onClick={() => setFilter(val)}
                                className={`px-4 py-2 rounded-xl text-sm font-medium transition ${filter === val ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200'}`}>
                                {lbl}
                            </button>
                        ))}
                    </div>

                    {/* Task list */}
                    <div className="space-y-3">
                        {displayed.length === 0 && (
                            <div className="text-center py-16 text-slate-400">
                                <Icons.ClipboardList className="w-12 h-12 mx-auto mb-3 opacity-30"/>
                                <p className="font-medium">No hay tareas {filter === 'completadas' ? 'completadas' : 'activas'}</p>
                            </div>
                        )}
                        {displayed.map(task => {
                            const urgency = getUrgency(task);
                            const sc = getTaskStatusCfg(task.status);
                            const borderColor = urgency === 'overdue' ? 'border-l-red-500' : urgency === 'urgent' ? 'border-l-amber-500' : task.status === 'completada' ? 'border-l-emerald-400' : task.status === 'en_progreso' ? 'border-l-blue-400' : 'border-l-slate-200';
                            const nextBtnClass = sc.next === 'completada' ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : sc.next === 'en_progreso' ? 'bg-blue-100 text-blue-700 hover:bg-blue-200' : 'bg-amber-100 text-amber-700 hover:bg-amber-200';

                            return (
                                <div key={task.id} className={`bg-white rounded-xl shadow-sm border border-slate-100 border-l-4 ${borderColor} flex gap-3 p-4 ${task.status === 'completada' ? 'opacity-60' : ''}`}>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex flex-wrap items-center gap-2 mb-1">
                                            <span className={`font-semibold text-slate-800 ${task.status === 'completada' ? 'line-through text-slate-400' : ''}`}>
                                                {task.title}
                                            </span>
                                            <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${sc.badge}`}>{sc.label}</span>
                                            {task.priority === 'alta' && <span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-orange-100 text-orange-700">Alta prioridad</span>}
                                            {urgency === 'overdue' && <span className="px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">Vencida</span>}
                                            {urgency === 'urgent' && <span className="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-700">Próxima</span>}
                                        </div>
                                        <div className="flex flex-wrap gap-4 text-xs text-slate-500">
                                            {task.responsible && (
                                                <span className="flex items-center gap-1">
                                                    <Icons.Users className="w-3.5 h-3.5"/>
                                                    {task.responsible}
                                                </span>
                                            )}
                                            {task.dueDate && (
                                                <span className={`flex items-center gap-1 ${urgency === 'overdue' ? 'text-red-600 font-semibold' : urgency === 'urgent' ? 'text-amber-600 font-semibold' : ''}`}>
                                                    <Icons.Clock className="w-3.5 h-3.5"/>
                                                    {task.dueDate}
                                                </span>
                                            )}
                                        </div>
                                        {task.notes && <p className="text-xs text-slate-400 mt-1 truncate">{task.notes}</p>}
                                        {task.itemsSummary && (
                                            <p className="text-xs text-slate-600 mt-1">
                                                <span className="font-semibold">Productos: </span>{task.itemsSummary}
                                            </p>
                                        )}
                                        {task.completionNote && task.status === 'completada' && (
                                            <p className="text-xs text-emerald-600 mt-1 italic">✓ {task.completionNote}</p>
                                        )}
                                    </div>
                                    <div className="flex items-center gap-2 flex-shrink-0">
                                        <button onClick={() => sc.next === 'completada' ? (setCompletingTask(task), setCompletionNote('')) : onUpdateStatus(task.id, sc.next)}
                                            className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition ${nextBtnClass}`}>
                                            {sc.nextLabel}
                                        </button>
                                        {task.quoteId && onGoToQuote && (
                                            <button onClick={() => onGoToQuote(task.quoteId)} title="Ver presupuesto"
                                                className="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition">
                                                <Icons.FileText className="w-4 h-4"/>
                                            </button>
                                        )}
                                        <button onClick={() => openForm(task)} title="Editar tarea" className="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
                                            <Icons.Edit2 className="w-4 h-4"/>
                                        </button>
                                        <button onClick={() => onDelete(task.id)} title="Eliminar tarea" className="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
                                            <Icons.Trash2 className="w-4 h-4"/>
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Modal nota de cierre */}
                    {completingTask && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => { setCompletingTask(null); setCompletionNote(''); }}>
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-2 mb-1">
                                    <Icons.CheckCircle className="w-5 h-5 text-emerald-500"/>
                                    <h3 className="font-bold text-slate-800">Completar tarea</h3>
                                </div>
                                <p className="text-sm text-slate-500 mb-4 pl-7">{completingTask.title}</p>
                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Nota de cierre <span className="font-normal text-slate-400">(opcional)</span></label>
                                <textarea
                                    value={completionNote}
                                    onChange={e => setCompletionNote(e.target.value)}
                                    autoFocus
                                    rows="3"
                                    placeholder="¿Cómo quedó? ¿Algo importante a recordar?"
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 text-sm focus:ring-2 focus:ring-emerald-400 focus:border-transparent resize-none"/>
                                <div className="flex gap-3 justify-end mt-4">
                                    <button onClick={() => { setCompletingTask(null); setCompletionNote(''); }}
                                        className="px-4 py-2 border border-slate-200 text-slate-700 rounded-xl hover:bg-slate-50 font-medium text-sm transition">
                                        Cancelar
                                    </button>
                                    <button onClick={() => {
                                            onSave({ ...completingTask, status: 'completada', completionNote: completionNote.trim(), completedAt: new Date().toISOString() });
                                            setCompletingTask(null); setCompletionNote('');
                                        }}
                                        className="px-4 py-2 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 font-medium text-sm transition flex items-center gap-1.5">
                                        <Icons.CheckCircle className="w-4 h-4"/>
                                        Completar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    // Forzar verificación de nueva versión en cada carga de página
                    reg.update();
                    // controllerchange se dispara cuando el nuevo SW toma control efectivo
                    navigator.serviceWorker.addEventListener('controllerchange', () => {
                        window.location.reload();
                    });
                }).catch(() => {});
            });
        }
    </script>
</body>
</html>
