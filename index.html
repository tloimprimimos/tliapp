                    {/* Widget de Tareas Urgentes */}

        // Client Search Component (Autocomplete)
        function ClientSearch({ clients, selectedClient, onSelect, onNewClient }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [isOpen, setIsOpen] = useState(false);
            const [highlightedIndex, setHighlightedIndex] = useState(0);
            const searchRef = React.useRef(null);

            // Filtrar clientes según búsqueda
            const filteredClients = clients.filter(client => {
                const searchLower = searchTerm.toLowerCase();
                return (
                    client.name?.toLowerCase().includes(searchLower) ||
                    client.rif?.toLowerCase().includes(searchLower) ||
                    client.email?.toLowerCase().includes(searchLower)
                );
            });

            // Cerrar dropdown al hacer clic fuera
            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (searchRef.current && !searchRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            // Manejar teclas de navegación
            const handleKeyDown = (e) => {
                if (!isOpen) {
                    if (e.key === 'ArrowDown' || e.key === 'Enter') {
                        setIsOpen(true);
                        e.preventDefault();
                    }
                    return;
                }

                switch (e.key) {
                    case 'ArrowDown':
                        e.preventDefault();
                        setHighlightedIndex(prev => 
                            prev < filteredClients.length - 1 ? prev + 1 : prev
                        );
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        setHighlightedIndex(prev => prev > 0 ? prev - 1 : 0);
                        break;
                    case 'Enter':
                        e.preventDefault();
                        if (filteredClients[highlightedIndex]) {
                            handleSelect(filteredClients[highlightedIndex]);
                        }
                        break;
                    case 'Escape':
                        setIsOpen(false);
                        break;
                }
            };

            const handleSelect = (client) => {
                onSelect(client);
                setSearchTerm('');
                setIsOpen(false);
                setHighlightedIndex(0);
            };

            const displayValue = selectedClient 
                ? `${selectedClient.name}${selectedClient.rif ? ` - ${selectedClient.rif}` : ''}`
                : '';

            return (
                <div className="mb-6">
                    <label className="block text-sm font-semibold text-slate-700 mb-2">Cliente</label>
                    <div className="flex gap-2">
                        <div ref={searchRef} className="flex-1 relative">
                            <div className="relative">
                                <input
                                    type="text"
                                    value={isOpen ? searchTerm : displayValue}
                                    onChange={(e) => {
                                        setSearchTerm(e.target.value);
                                        setIsOpen(true);
                                        setHighlightedIndex(0);
                                    }}
                                    onFocus={() => setIsOpen(true)}
                                    onKeyDown={handleKeyDown}
                                    placeholder="Buscar o seleccionar cliente..."
                                    className="w-full px-4 py-2 pr-10 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                />
                                <button
                                    type="button"
                                    onClick={() => setIsOpen(!isOpen)}
                                    className="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
                                    </svg>
                                </button>
                                {selectedClient && (
                                    <button
                                        type="button"
                                        onClick={() => {
                                            onSelect(null);
                                            setSearchTerm('');
                                        }}
                                        className="absolute right-9 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-600"
                                        title="Limpiar selección"
                                    >
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                                        </svg>
                                    </button>
                                )}
                            </div>

                            {/* Dropdown de resultados */}
                            {isOpen && (
                                <div className="absolute z-50 w-full mt-1 bg-white border border-slate-300 rounded-lg shadow-lg max-h-60 overflow-y-auto">
                                    {filteredClients.length > 0 ? (
                                        filteredClients.map((client, index) => (
                                            <button
                                                key={client.id}
                                                type="button"
                                                onClick={() => handleSelect(client)}
                                                className={`w-full text-left px-4 py-2 hover:bg-blue-50 transition-colors ${
                                                    index === highlightedIndex ? 'bg-blue-50' : ''
                                                }`}
                                            >
                                                <div className="font-semibold text-slate-800">{client.name}</div>
                                                {client.rif && (
                                                    <div className="text-sm text-slate-600">RIF: {client.rif}</div>
                                                )}
                                                {client.email && (
                                                    <div className="text-xs text-slate-500">{client.email}</div>
                                                )}
                                            </button>
                                        ))
                                    ) : (
                                        <div className="px-4 py-3 text-sm text-slate-500 text-center">
                                            No se encontraron clientes
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                        
                        <button
                            type="button"
                            onClick={onNewClient}
                            className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 flex items-center space-x-2 whitespace-nowrap"
                            title="Crear nuevo cliente"
                        >
                            <Icons.Plus className="w-5 h-5" />
                            <span>Nuevo Cliente</span>
                        </button>
                    </div>
                    <p className="text-xs text-slate-500 mt-1">
                        {selectedClient 
                            ? `✓ Cliente seleccionado: ${selectedClient.name}` 
                            : 'Escribe para buscar o haz clic para ver todos los clientes'}
                    </p>
                </div>
            );
        }

        // Quote Form Component (continuará con todo el código del formulario...)
        function QuoteForm({ quote, clients, config, quotes = [], onSave, onSaveAndStay, onCancel, onGoToClients }) {
            // Función para formatear fecha a dd/mm/yyyy
            const formatDateToDDMMYYYY = (date) => {
                const d = new Date(date);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                return `${day}/${month}/${year}`;
            };
            
            // Función para convertir dd/mm/yyyy a yyyy-mm-dd (para el input type="date")
            const ddmmyyyyToISO = (dateStr) => {
                if (!dateStr) return '';
                if (dateStr.includes('-')) return dateStr; // Ya está en formato ISO
                const [day, month, year] = dateStr.split('/');
                return `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
            };
            
            // Función para convertir yyyy-mm-dd a dd/mm/yyyy (para guardar)
            const isoToDDMMYYYY = (isoDate) => {
                if (!isoDate) return '';
                if (isoDate.includes('/')) return isoDate; // Ya está en formato dd/mm/yyyy
                const [year, month, day] = isoDate.split('-');
                return `${day}/${month}/${year}`;
            };
            
            const generateNumber = () => {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const prefix = `${year}-${month}${day}`;
                const count = quotes.filter(q => (q.number || '').startsWith(prefix)).length;
                return `${prefix}${count + 1}`;
            };

            const [formData, setFormData] = useState(
                quote || {
                    number: generateNumber(),
                    date: formatDateToDDMMYYYY(new Date()),
                    deliveryDate: '',
                    seller: '',
                    client: null,
                    items: [{ quantity: 1, description: '', unitPrice: 0 }],
                    includeIva: false,
                    paymentConditions: 'Transferencia - Pago Móvil',
                    validUntil: '',
                    notes: '',
                    status: 'pendiente'
                }
            );


            // Limpiar storage temporal cuando se seleccione un cliente
            useEffect(() => {
                if (formData.client && sessionStorage.getItem('tempQuote')) {
                    sessionStorage.removeItem('tempQuote');
                }
            }, [formData.client]);

            const addItem = () => {
                setFormData(prev => ({
                    ...prev,
                    items: [...prev.items, { quantity: 1, description: '', unitPrice: 0 }]
                }));
            };

            const removeItem = (index) => {
                setFormData(prev => ({
                    ...prev,
                    items: prev.items.filter((_, i) => i !== index)
                }));
            };

            const updateItem = (index, field, value) => {
                setFormData(prev => ({
                    ...prev,
                    items: prev.items.map((item, i) =>
                        i === index ? { ...item, [field]: value } : item
                    )
                }));
            };

            const calculateSubtotal = () => {
                return formData.items.reduce((sum, item) => {
                    return sum + ((item.quantity || 0) * (item.unitPrice || 0));
                }, 0);
            };

            const calculateTotal = () => {
                const subtotal = calculateSubtotal();
                return formData.includeIva ? subtotal * 1.16 : subtotal;
            };

            const [saving, setSaving] = useState(false);

            const handleSave = async () => {
                if (saving) return;
                if (!formData.client) {
                    toast('Selecciona un cliente primero', 'warning');
                    return;
                }
                setSaving(true);
                try {
                    await onSave(formData);
                } finally {
                    setSaving(false);
                }
            };

            const handleSaveAndPDF = async () => {
                if (saving) return;
                if (!formData.client) {
                    toast('Seleccioná un cliente primero', 'warning');
                    return;
                }
                setSaving(true);
                try {
                    if (onSaveAndStay) await onSaveAndStay(formData);
                    await generatePDF();
                } catch (e) {
                    toast('Error al guardar o generar el PDF', 'error');
                } finally {
                    setSaving(false);
                }
            };

            // Comprime el logo antes de insertarlo en el PDF para evitar archivos pesados
            const compressLogo = (dataUrl, maxPx = 300, quality = 0.82) => new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const scale = Math.min(maxPx / img.width, maxPx / img.height, 1);
                    const canvas = document.createElement('canvas');
                    canvas.width = Math.round(img.width * scale);
                    canvas.height = Math.round(img.height * scale);
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#0f172a';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = () => resolve(dataUrl);
                img.src = dataUrl;
            });

            // NUEVA FUNCIÓN: Enviar presupuesto por email con EmailJS
            const sendEmailWithPDF = async () => {
                if (!formData.client || !formData.client.email) {
                    toast('El cliente no tiene email registrado', 'warning');
                    return;
                }

                if (!quote) {
                    toast('Guardá el presupuesto antes de enviarlo', 'warning');
                    return;
                }

                const confirmSend = window.confirm(
                    `¿Enviar presupuesto ${formData.number} a ${formData.client.email}?`
                );
                
                if (!confirmSend) return;

                try {
                    // Mostrar indicador de carga
                    const originalButton = event.target;
                    originalButton.disabled = true;
                    originalButton.innerHTML = '<svg class="animate-spin h-5 w-5 mr-2 inline" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Enviando...';

                    // Calcular totales para el email
                    const subtotal = calculateSubtotal();
                    const total = calculateTotal();

                    // Inicializar EmailJS
                    emailjs.init('a1HvREFCCu6s4gwt_'); // Tu Public Key (corregido)

                    // Preparar datos del email - Asegurar que todos sean strings
                    const templateParams = {
                        to_email: String(formData.client.email || ''),
                        client_name: String(formData.client.name || ''),
                        quote_number: String(formData.number || ''),
                        quote_date: String(formData.date || ''),
                        subtotal: String(subtotal.toFixed(2)),
                        total: String(total.toFixed(2)),
                        payment_conditions: String(formData.paymentConditions || 'A convenir'),
                        seller: String(formData.seller || 'Te lo Imprimo'),
                        company_email: String(config?.email || 'teloimprimooficial@gmail.com')
                    };

                    // Enviar email usando EmailJS
                    const response = await emailjs.send(
                        'service_u32o7yh',  // Tu Service ID
                        'template_vmpe01h', // Tu Template ID (corregido)
                        templateParams
                    );

                    // Restaurar botón
                    originalButton.disabled = false;
                    originalButton.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><span>Enviar por Email</span>';

                    if (response.status === 200) {
                        // Actualizar estado del presupuesto a "enviado"
                        await db.collection('quotes').doc(quote.id).update({
                            status: 'enviado',
                            lastSentDate: new Date().toISOString()
                        });

                        toast(`Email enviado a ${formData.client.email}`);
                    }

                } catch (error) {
                    console.error('Error al enviar email:', error);
                    
                    // Restaurar botón en caso de error
                    if (event.target) {
                        event.target.disabled = false;
                        event.target.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><span>Enviar por Email</span>';
                    }
                    
                    toast(`Error al enviar el email: ${error.text || error.message || 'intentá de nuevo'}`, 'error');
                }
            };

            const generatePDF = async () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 15;
                let y = 15;

                // ===== HEADER SOBRIO =====
                const headerHeight = 35;
                // Fondo oscuro principal
                doc.setFillColor(15, 23, 42);
                doc.rect(0, 0, pageWidth, headerHeight, 'F');
                // Línea de acento azul en la base
                doc.setFillColor(59, 130, 246);
                doc.rect(0, headerHeight - 2, pageWidth, 2, 'F');

                // Logo (comprimido para evitar PDFs pesados)
                if (config.logo) {
                    try {
                        const logoData = await compressLogo(config.logo);
                        doc.addImage(logoData, 'JPEG', margin, 5, 25, 25);
                    } catch (e) {
                        console.error('Error al agregar logo:', e);
                    }
                }

                // Texto del header
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.setFont(undefined, 'bold');
                
                // Servicios a la derecha del logo
                const services = [
                    'GRABADO LASER    PENDONES',
                    'BANNER    PRINGRAF PAF',
                    'ETIQUETAS    SUBLIMACION',
                    'IMPRESION EN VINIL'
                ];
                
                let serviceY = 12;
                services.forEach(service => {
                    doc.text(service, margin + 35, serviceY);
                    serviceY += 4;
                });

                // Slogan abajo a la derecha
                doc.setFontSize(8);
                doc.setFont(undefined, 'italic');
                doc.text('Te lo imaginas • Nosotros lo hacemos', pageWidth - margin - 5, headerHeight - 5, { align: 'right' });

                y = headerHeight + 5;

                // ===== INFORMACIÓN DE LA EMPRESA (debajo del header) =====
                doc.setTextColor(120, 120, 120);
                doc.setFontSize(8);
                doc.setFont(undefined, 'normal');
                const companyInfo = `RIF: ${config.rif} | ${config.email} | ${config.website}`;
                doc.text(companyInfo, pageWidth / 2, y, { align: 'center' });
                
                y += 10;

                // ===== TÍTULO DEL PRESUPUESTO =====
                doc.setTextColor(59, 130, 246);
                doc.setFontSize(16);
                doc.setFont(undefined, 'bold');
                doc.text(`Presupuesto ${formData.number}`, margin, y);
                
                y += 8;
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.text(`Fecha: ${formData.date}`, margin, y);
                if (formData.deliveryDate) {
                    doc.text(`Entrega: ${formData.deliveryDate}`, margin + 50, y);
                }
                doc.text(`Vendedor: ${formData.seller}`, margin + 110, y);

                y += 10;

                // ===== INFORMACIÓN DEL CLIENTE (con borde azul) =====
                const clientBoxY = y;
                const clientBoxHeight = 30;
                
                // Borde azul a la izquierda
                doc.setDrawColor(59, 130, 246);
                doc.setLineWidth(2);
                doc.line(margin, clientBoxY, margin, clientBoxY + clientBoxHeight);
                
                // Fondo gris muy claro
                doc.setFillColor(249, 250, 251);
                doc.rect(margin + 2, clientBoxY, pageWidth - 2 * margin - 2, clientBoxHeight, 'F');

                // Contenido del cliente
                doc.setFontSize(9);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text('Cliente', margin + 5, clientBoxY + 5);
                
                doc.setFont(undefined, 'bold');
                doc.setFontSize(10);
                doc.text(formData.client.name, margin + 5, clientBoxY + 11);
                
                doc.setFont(undefined, 'normal');
                doc.setFontSize(8);
                let clientY = clientBoxY + 16;
                if (formData.client.rif) {
                    doc.text(`RIF/CI: ${formData.client.rif}`, margin + 5, clientY);
                    clientY += 4;
                }
                if (formData.client.email) {
                    doc.text(`Email: ${formData.client.email}`, margin + 5, clientY);
                    clientY += 4;
                }
                if (formData.client.phone) {
                    doc.text(`Tel: ${formData.client.phone}`, margin + 5, clientY);
                    clientY += 4;
                }
                if (formData.client.address) {
                    doc.text(`Dir: ${formData.client.address}`, margin + 5, clientY);
                }

                y = clientBoxY + clientBoxHeight + 8;

                // ===== CONDICIONES (si existen) =====
                if (formData.paymentConditions) {
                    doc.setFontSize(8);
                    doc.setFont(undefined, 'bold');
                    doc.text(`Condiciones: `, margin, y);
                    doc.setFont(undefined, 'normal');
                    doc.text(formData.paymentConditions, margin + 22, y);
                    y += 8;
                }

                // ===== TABLA DE PRODUCTOS =====
                // Header de la tabla (fondo oscuro)
                doc.setFillColor(52, 73, 94);
                doc.rect(margin, y, pageWidth - 2 * margin, 8, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.setFont(undefined, 'bold');
                doc.text('Cant', margin + 3, y + 5);
                doc.text('Descripción', margin + 20, y + 5);
                doc.text('Precio UND', pageWidth - margin - 45, y + 5);
                doc.text('Total', pageWidth - margin - 15, y + 5);
                
                y += 10;

                // Items de la tabla
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                
                formData.items.forEach((item, index) => {
                    // Alternar color de fondo
                    if (index % 2 === 0) {
                        doc.setFillColor(249, 250, 251);
                        doc.rect(margin, y - 4, pageWidth - 2 * margin, 8, 'F');
                    }
                    
                    const total = (item.quantity || 0) * (item.unitPrice || 0);
                    doc.text(String(item.quantity), margin + 3, y);
                    
                    // Descripción con wrapping si es muy larga
                    const maxWidth = pageWidth - margin - 80;
                    const lines = doc.splitTextToSize(item.description, maxWidth);
                    doc.text(lines, margin + 20, y);
                    
                    doc.text(`$${(item.unitPrice || 0).toFixed(2)}`, pageWidth - margin - 45, y);
                    doc.text(`$${total.toFixed(2)}`, pageWidth - margin - 15, y, { align: 'right' });
                    
                    y += Math.max(8, lines.length * 5);
                });

                y += 5;

                // ===== TOTALES =====
                const subtotal = calculateSubtotal();
                const iva = formData.includeIva ? subtotal * 0.16 : 0;
                const total = subtotal + iva;

                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                
                // Línea separadora
                doc.setDrawColor(200, 200, 200);
                doc.setLineWidth(0.5);
                doc.line(pageWidth - margin - 60, y, pageWidth - margin, y);
                y += 5;

                doc.text('Subtotal:', pageWidth - margin - 45, y);
                doc.text(`$${subtotal.toFixed(2)}`, pageWidth - margin - 15, y, { align: 'right' });
                y += 5;

                if (formData.includeIva) {
                    doc.text('IVA 16%:', pageWidth - margin - 45, y);
                    doc.text(`$${iva.toFixed(2)}`, pageWidth - margin - 15, y, { align: 'right' });
                    
                    // Línea antes del total
                    y += 3;
                    doc.setDrawColor(200, 200, 200);
                    doc.line(pageWidth - margin - 60, y, pageWidth - margin, y);
                    y += 5;
                }

                doc.setFont(undefined, 'bold');
                doc.setFontSize(11);
                doc.setTextColor(59, 130, 246);
                doc.text('Total:', pageWidth - margin - 45, y);
                doc.text(`$${total.toFixed(2)}`, pageWidth - margin - 15, y, { align: 'right' });

                y += 10;

                // ===== NOTAS (con fondo amarillo claro) =====
                if (formData.notes || formData.validUntil) {
                    doc.setFillColor(254, 252, 232);
                    doc.setDrawColor(251, 191, 36);
                    doc.setLineWidth(0.5);
                    
                    const notesHeight = 15;
                    doc.rect(margin, y, pageWidth - 2 * margin, notesHeight, 'FD');
                    
                    doc.setFontSize(8);
                    doc.setTextColor(0, 0, 0);
                    doc.setFont(undefined, 'bold');
                    
                    let noteY = y + 5;
                    if (formData.notes) {
                        doc.text(`Nota: `, margin + 3, noteY);
                        doc.setFont(undefined, 'normal');
                        doc.text(formData.notes, margin + 12, noteY);
                        noteY += 4;
                    }
                    
                    if (formData.validUntil) {
                        doc.setFont(undefined, 'bold');
                        doc.text(`Válido hasta: `, margin + 3, noteY);
                        doc.setFont(undefined, 'normal');
                        doc.text(formData.validUntil, margin + 25, noteY);
                    }
                    
                    y += notesHeight + 5;
                }

                // ===== DATOS DE PAGO (al final) =====
                y += 5;
                doc.setFontSize(9);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text('Datos de Pago', pageWidth / 2, y, { align: 'center' });
                y += 5;
                doc.setFontSize(8);
                doc.setFont(undefined, 'normal');
                doc.text(`Pago Móvil: 0414-2593085 | CI: 16676859 | Bancamiga/Banesco`, pageWidth / 2, y, { align: 'center' });

                // Guardar con nombre correcto
                doc.save(`Presupuesto-${formData.number}.pdf`);
            };

            return (
                <div className="max-w-5xl mx-auto p-6">
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800">
                                    {quote ? 'Editar Presupuesto' : 'Nuevo Presupuesto'}
                                </h2>
                                {quote && <p className="text-slate-500 text-sm mt-0.5">{quote.number}</p>}
                            </div>
                            <button onClick={onCancel} className="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-xl transition">
                                <Icons.ArrowLeft className="w-5 h-5" />
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">
                                    N° Presupuesto
                                </label>
                                <input
                                    type="text"
                                    value={formData.number}
                                    onChange={(e) => setFormData({ ...formData, number: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Fecha</label>
                                <input
                                    type="date"
                                    value={ddmmyyyyToISO(formData.date)}
                                    onChange={(e) => setFormData({ ...formData, date: isoToDDMMYYYY(e.target.value) })}
                                    className="w-full px-4 py-2 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Fecha de Entrega</label>
                                <input
                                    type="date"
                                    value={ddmmyyyyToISO(formData.deliveryDate)}
                                    onChange={(e) => setFormData({ ...formData, deliveryDate: isoToDDMMYYYY(e.target.value) })}
                                    className="w-full px-4 py-2 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Vendedor</label>
                                <input
                                    type="text"
                                    value={formData.seller}
                                    onChange={(e) => setFormData({ ...formData, seller: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="Nombre del vendedor"
                                />
                            </div>
                        </div>

                        {/* Estado del presupuesto */}
                        <div className="mb-6">
                            <label className="block text-sm font-semibold text-slate-700 mb-2">Estado</label>
                            <div className="flex flex-wrap gap-2">
                                {['pendiente','enviado','aceptado','rechazado'].map(s => {
                                    const c = getStatusConfig(s);
                                    const isActive = (formData.status || 'pendiente') === s;
                                    return (
                                        <button key={s} type="button"
                                            onClick={() => setFormData({...formData, status: s})}
                                            className={`px-4 py-2 rounded-xl text-sm font-bold transition ${isActive ? c.activeBg : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                            {c.label}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        <ClientSearch
                            clients={clients}
                            selectedClient={formData.client}
                            onSelect={(client) => setFormData({ ...formData, client: client })}
                            onNewClient={() => {
                                if (onGoToClients) {
                                    onGoToClients(formData);
                                }
                            }}
                        />

                        <div className="mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <label className="block text-sm font-semibold text-slate-700">
                                    Productos/Servicios
                                </label>
                                <button
                                    onClick={addItem}
                                    className="flex items-center space-x-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                >
                                    <Icons.Plus className="w-4 h-4" />
                                    <span>Agregar Item</span>
                                </button>
                            </div>

                            {formData.items.map((item, index) => (
                                <div key={index} className="flex gap-2 mb-3">
                                    <input
                                        type="number"
                                        value={item.quantity}
                                        onChange={(e) => updateItem(index, 'quantity', parseFloat(e.target.value) || 0)}
                                        className="w-20 px-3 py-2 border border-slate-300 rounded-lg"
                                        placeholder="Cant."
                                    />
                                    <input
                                        type="text"
                                        value={item.description}
                                        onChange={(e) => updateItem(index, 'description', e.target.value)}
                                        className="flex-1 px-4 py-2 border border-slate-300 rounded-lg"
                                        placeholder="Descripción"
                                    />
                                    <input
                                        type="number"
                                        value={item.unitPrice}
                                        onChange={(e) => updateItem(index, 'unitPrice', parseFloat(e.target.value) || 0)}
                                        className="w-32 px-3 py-2 border border-slate-300 rounded-lg"
                                        placeholder="Precio"
                                        step="0.01"
                                    />
                                    <div className="w-32 px-3 py-2 bg-slate-100 rounded-lg flex items-center justify-end">
                                        ${((item.quantity || 0) * (item.unitPrice || 0)).toFixed(2)}
                                    </div>
                                    {formData.items.length > 1 && (
                                        <button
                                            onClick={() => removeItem(index)}
                                            className="p-2 text-red-600 hover:bg-red-50 rounded-lg"
                                        >
                                            <Icons.Trash2 className="w-5 h-5" />
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>

                        <div className="bg-gradient-to-r from-slate-50 to-blue-50 rounded-xl border border-slate-100 p-4 mb-6">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-slate-600 text-sm">Subtotal:</span>
                                <span className="font-semibold text-slate-800">${calculateSubtotal().toFixed(2)}</span>
                            </div>
                            <div className="flex justify-between items-center mb-2">
                                <label className="flex items-center gap-2 cursor-pointer">
                                    <input
                                        type="checkbox"
                                        checked={formData.includeIva}
                                        onChange={(e) => setFormData({ ...formData, includeIva: e.target.checked })}
                                        className="rounded accent-blue-600"
                                    />
                                    <span className="text-slate-600 text-sm">IVA (16%):</span>
                                </label>
                                <span className="font-semibold text-slate-800">
                                    ${formData.includeIva ? (calculateSubtotal() * 0.16).toFixed(2) : '0.00'}

                            <div className="flex justify-between items-center pt-2 border-t border-slate-300">
                                <span className="text-lg font-bold text-slate-800">Total:</span>
                                <span className="text-lg font-bold text-blue-600">${calculateTotal().toFixed(2)}</span>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">
                                    Condiciones de Pago
                                </label>
                                <input
                                    type="text"
                                    value={formData.paymentConditions}
                                    onChange={(e) => setFormData({ ...formData, paymentConditions: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">
                                    Válido hasta
                                </label>
                                <input
                                    type="date"
                                    value={ddmmyyyyToISO(formData.validUntil)}

                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                />
                            </div>
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-semibold text-slate-700 mb-2">Notas</label>
                            <textarea
                                value={formData.notes}
                                onChange={(e) => setFormData({ ...formData, notes: e.target.value })}
                                className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                rows="3"
                                placeholder="Notas adicionales..."
                            />
                        </div>

                        <div className="flex justify-end space-x-4">
                            <button
                                onClick={onCancel}
                                className="px-6 py-2 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50"
                            >
                                Cancelar
                            </button>
                            <button
                                onClick={handleSave}
                                disabled={saving}
                                className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <Icons.Save className="w-5 h-5" />
                                <span>{saving ? 'Guardando...' : 'Guardar'}</span>
                            </button>
                            <button
                                onClick={quote ? generatePDF : handleSaveAndPDF}
                                disabled={saving}
                                className="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 flex items-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <Icons.Download className="w-5 h-5" />
                                <span>{quote ? 'Generar PDF' : (saving ? 'Guardando...' : 'Guardar y PDF')}</span>
                            </button>
                            {quote && (
                                <button
                                    onClick={sendEmailWithPDF}
                                    className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 flex items-center space-x-2"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                    </svg>
                                    <span>Enviar por Email</span>
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Clients Manager Component
        function ClientsManager({ clients, quotes = [], onSave, onDelete, formTrigger = 0, onViewQuote }) {
            const [showForm, setShowForm]       = useState(false);
            const [editingClient, setEditingClient] = useState(null);
            const [searchTerm, setSearchTerm]   = useState('');
            const [sortBy, setSortBy]           = useState('name-asc');
            const [historyClient, setHistoryClient] = useState(null);
            const emptyForm = { name:'', rif:'', email:'', phone:'', address:'' };
            const [formData, setFormData]       = useState(emptyForm);
            const [saving, setSaving]           = useState(false);

            const now          = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const sevenDaysAgo = new Date(now); sevenDaysAgo.setDate(now.getDate() - 7);

            const newThisMonth = clients.filter(c => c.createdAt && new Date(c.createdAt) >= startOfMonth).length;
            const newThisWeek  = clients.filter(c => c.createdAt && new Date(c.createdAt) >= sevenDaysAgo).length;

            useEffect(() => {
                if (formTrigger > 0) { setFormData(emptyForm); setEditingClient(null); setShowForm(true); }
            }, [formTrigger]);

            let filtered = clients.filter(c => {
                if (!searchTerm) return true;
                const s = searchTerm.toLowerCase();
                return c.name?.toLowerCase().includes(s) || c.rif?.toLowerCase().includes(s) ||
                       c.email?.toLowerCase().includes(s) || c.phone?.toLowerCase().includes(s);
            });
            filtered = [...filtered].sort((a,b) => {
                if (sortBy === 'name-desc') return (b.name||'').localeCompare(a.name||'');
                if (sortBy === 'recent')    return new Date(b.createdAt||0) - new Date(a.createdAt||0);
                return (a.name||'').localeCompare(b.name||'');
            });

            const openEdit = (client) => { setFormData({...client}); setEditingClient(client); setShowForm(true); };
            const openNew  = () => { setFormData(emptyForm); setEditingClient(null); setShowForm(true); };

            const handleSave = async () => {
                if (!formData.name.trim()) { toast('Ingresá el nombre del cliente', 'warning'); return; }
                if (saving) return;
                setSaving(true);
                try {
                    await onSave(formData);
                    setShowForm(false);
                    setEditingClient(null);
                    setFormData(emptyForm);
                    const tempQuote = sessionStorage.getItem('tempQuote');
                    if (tempQuote) {
                        sessionStorage.removeItem('tempQuote');
                        setTimeout(() => toast('Cliente guardado. Seleccionalo en el presupuesto.'), 500);
                    } else {
                        toast(editingClient ? 'Cliente actualizado' : 'Cliente agregado');
                    }
                } catch (e) {
                    toast('Error al guardar el cliente. Intentá de nuevo.', 'error');
                } finally {
                    setSaving(false);
                }
            };

            return (
                <div className="p-6">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Clientes</h2>
                            <p className="text-slate-500 text-sm mt-0.5">{clients.length} en total · {filtered.length} mostrados</p>
                        </div>
                        <div className="flex items-center gap-3">
                            {sessionStorage.getItem('tempQuote') && (
                                <button onClick={() => window.location.reload()}
                                    className="flex items-center gap-2 px-4 py-2.5 bg-slate-600 text-white text-sm font-bold rounded-xl hover:bg-slate-700 transition">
                                    <Icons.ArrowLeft className="w-4 h-4"/> Volver al presupuesto
                                </button>
                            )}
                            <button onClick={openNew}
                                className="flex items-center gap-2 px-4 py-2.5 text-white text-sm font-bold rounded-xl shadow-sm hover:opacity-90 transition-all"
                                style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)'}}>
                                <Icons.Plus className="w-4 h-4"/> Nuevo Cliente
                            </button>
                        </div>
                    </div>

                    {sessionStorage.getItem('tempQuote') && (
                        <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-4 text-sm text-blue-700 flex items-center gap-2">
                            <Icons.FileText className="w-4 h-4 flex-shrink-0"/>

                        </div>
                    )}

                    <div className="grid grid-cols-3 gap-4 mb-5">

                            <p className="text-3xl font-extrabold text-slate-800">{clients.length}</p>
                        </div>
                        <div className="rounded-2xl p-4 border border-emerald-100 shadow-sm" style={{background:'linear-gradient(135deg,#f0fdf4,#dcfce7)'}}>

                            <p className="text-3xl font-extrabold text-emerald-700">{newThisMonth}</p>
                        </div>

                            <p className="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-1">Últimos 7 días</p>
                            <p className="text-3xl font-extrabold text-indigo-700">{newThisWeek}</p>
                        </div>
                    </div>

                    {/* Search + Sort */}
                    <div className="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-slate-100 flex gap-3 items-center">
                        <div className="relative flex-1">
                            <svg className="w-4 h-4 text-indigo-400 absolute left-3.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                            <input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                placeholder="Buscar por nombre, RIF, email o teléfono..."
                                className="w-full pl-10 pr-10 py-2.5 border-2 border-slate-200 rounded-xl focus:border-indigo-500 bg-slate-50 text-sm font-medium text-slate-700 placeholder-slate-400"/>
                            {searchTerm && (
                                <button onClick={() => setSearchTerm('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                    <Icons.XCircle className="w-4 h-4"/>
                                </button>
                            )}
                        </div>
                        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                            className="px-3 py-2.5 border-2 border-slate-200 rounded-xl text-sm font-semibold text-slate-600 focus:border-indigo-500 bg-slate-50">
                            <option value="name-asc">Nombre A-Z</option>
                            <option value="name-desc">Nombre Z-A</option>
                            <option value="recent">Más recientes</option>
                        </select>
                    </div>

                    {/* Table */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead>
                                    <tr className="border-b border-slate-100 bg-slate-50">
                                        <th className="text-left py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Nombre</th>
                                        <th className="text-left py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">RIF / CI</th>
                                        <th className="text-left py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Email</th>
                                        <th className="text-left py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Teléfono</th>
                                        <th className="text-left py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Dirección</th>
                                        <th className="text-center py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {filtered.map(client => {
                                        const isNew = client.createdAt && new Date(client.createdAt) >= startOfMonth;
                                        return (
                                            <tr key={client.id} className="hover:bg-indigo-50/30 transition-colors group">
                                                <td className="py-3 px-4">
                                                    <div className="flex items-center gap-2.5">
                                                        <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-extrabold flex-shrink-0"
                                                            style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)'}}>
                                                            {(client.name||'?')[0].toUpperCase()}
                                                        </div>
                                                        <span className="font-semibold text-sm text-slate-800">{client.name}</span>
                                                        {isNew && (
                                                            <span className="text-xs px-1.5 py-0.5 bg-emerald-100 text-emerald-700 rounded-full font-bold">Nuevo</span>
                                                        )}
                                                    </div>
                                                </td>
                                                <td className="py-3 px-4 text-sm font-mono text-slate-600">{client.rif || '—'}</td>
                                                <td className="py-3 px-4 text-sm text-slate-600">{client.email || '—'}</td>
                                                <td className="py-3 px-4 text-sm text-slate-600">{client.phone || '—'}</td>
                                                <td className="py-3 px-4">
                                                    <span className="text-sm text-slate-500 block max-w-[180px] truncate">{client.address || '—'}</span>
                                                </td>
                                                <td className="py-3 px-4">
                                                    <div className="flex items-center justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => setHistoryClient(client)}
                                                            className="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition" title="Ver historial">
                                                            <Icons.ClipboardList className="w-4 h-4"/>
                                                        </button>
                                                        <button onClick={() => openEdit(client)}
                                                            className="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition" title="Editar">
                                                            <Icons.Edit2 className="w-4 h-4"/>
                                                        </button>
                                                        <button onClick={() => onDelete(client.id)}
                                                            className="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition" title="Eliminar">
                                                            <Icons.Trash2 className="w-4 h-4"/>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                        {filtered.length === 0 && (
                            <div className="text-center py-16 text-slate-400">
                                <Icons.Users className="w-10 h-10 mx-auto mb-3 opacity-30"/>
                                <p className="font-semibold text-slate-500">
                                    {searchTerm ? `Sin resultados para "${searchTerm}"` : 'No hay clientes registrados'}
                                </p>
                                {!searchTerm && (
                                    <button onClick={openNew} className="mt-3 text-sm text-indigo-600 hover:underline font-semibold">
                                        Crear el primer cliente →
                                    </button>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Modal Historial de presupuestos */}
                    {historyClient && (() => {
                        const clientQuotes = quotes
                            .filter(q => q.client?.name === historyClient.name || q.client?.id === historyClient.id)
                            .sort((a,b) => (b.number||'').localeCompare(a.number||''));
                        const totalFacturado = clientQuotes
                            .filter(q => q.status === 'aceptado' || q.status === 'cobrado')
                            .reduce((sum, q) => sum + (q.items?.reduce((s,i) => s+((i.quantity||0)*(i.unitPrice||0)),0)||0) * (q.includeIva ? 1.16 : 1), 0);
                        return (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(15,23,42,0.55)'}} onClick={() => setHistoryClient(null)}>
                                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                    <div style={{height:3,background:'linear-gradient(90deg,#6366f1,#8b5cf6,#ec4899)'}} className="rounded-t-2xl flex-shrink-0"/>
                                    <div className="p-5 border-b border-slate-100 flex items-center justify-between flex-shrink-0">
                                        <div>
                                            <h3 className="text-lg font-extrabold text-slate-800">{historyClient.name}</h3>
                                            <p className="text-sm text-slate-500">{clientQuotes.length} presupuesto{clientQuotes.length !== 1 ? 's' : ''} · Facturado: <span className="font-bold text-emerald-600">${totalFacturado.toFixed(2)}</span></p>
                                        </div>
                                        <button onClick={() => setHistoryClient(null)} className="p-1.5 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition">
                                            <Icons.XCircle className="w-5 h-5"/>
                                        </button>
                                    </div>
                                    <div className="overflow-y-auto flex-1">
                                        {clientQuotes.length === 0 ? (
                                            <div className="text-center py-12 text-slate-400">
                                                <Icons.FileText className="w-10 h-10 mx-auto mb-2 opacity-30"/>
                                                <p className="text-sm font-medium">Sin presupuestos registrados</p>
                                            </div>
                                        ) : (
                                            <table className="w-full">
                                                <thead className="sticky top-0 bg-slate-50 border-b border-slate-100">
                                                    <tr>
                                                        <th className="text-left py-2.5 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">N°</th>
                                                        <th className="text-left py-2.5 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Fecha</th>
                                                        <th className="text-left py-2.5 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Estado</th>
                                                        <th className="text-right py-2.5 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Total</th>
                                                        <th className="py-2.5 px-4"/>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {clientQuotes.map(q => {
                                                        const total = (q.items?.reduce((s,i) => s+((i.quantity||0)*(i.unitPrice||0)),0)||0) * (q.includeIva ? 1.16 : 1);
                                                        const sc = getStatusConfig(q.status || 'pendiente');
                                                        return (
                                                            <tr key={q.id} className="hover:bg-indigo-50/30 transition-colors">
                                                                <td className="py-3 px-4 font-bold text-sm text-slate-800">{q.number}</td>
                                                                <td className="py-3 px-4 text-sm text-slate-600">{q.date || '—'}</td>
                                                                <td className="py-3 px-4">
                                                                    <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${sc.badge}`}>{sc.label}</span>
                                                                </td>
                                                                <td className="py-3 px-4 text-right font-bold text-sm text-slate-800">${total.toFixed(2)}</td>
                                                                <td className="py-3 px-4">
                                                                    {onViewQuote && (
                                                                        <button onClick={() => { setHistoryClient(null); onViewQuote(q); }}
                                                                            className="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition" title="Abrir presupuesto">
                                                                            <Icons.FileText className="w-4 h-4"/>
                                                                        </button>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* Modal Form */}
                    {showForm && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(15,23,42,0.55)'}}>
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
                                <div style={{height:3,background:'linear-gradient(90deg,#6366f1,#8b5cf6,#ec4899)'}} className="rounded-t-2xl"/>
                                <div className="p-6">
                                    <div className="flex justify-between items-center mb-5">
                                        <h3 className="text-xl font-extrabold text-slate-800">
                                            {editingClient ? 'Editar Cliente' : 'Nuevo Cliente'}
                                        </h3>
                                        <button onClick={() => setShowForm(false)}
                                            className="p-1.5 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition">
                                            <Icons.XCircle className="w-5 h-5"/>
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2">
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Nombre *</label>
                                            <input type="text" value={formData.name} autoFocus
                                                onChange={e => setFormData({...formData, name:e.target.value})}
                                                className="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl focus:border-indigo-500 bg-slate-50 text-sm font-medium"
                                                placeholder="Nombre completo o razón social"/>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">RIF / CI</label>
                                            <input type="text" value={formData.rif}
                                                onChange={e => setFormData({...formData, rif:e.target.value})}
                                                className="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl focus:border-indigo-500 bg-slate-50 text-sm font-medium"
                                                placeholder="J-XXXXXXXX-X"/>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Teléfono</label>
                                            <input type="tel" value={formData.phone}
                                                onChange={e => setFormData({...formData, phone:e.target.value})}
                                                className="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl focus:border-indigo-500 bg-slate-50 text-sm font-medium"
                                                placeholder="0412-000-0000"/>

                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Email</label>

                                                onChange={e => setFormData({...formData, email:e.target.value})}
                                                className="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl focus:border-indigo-500 bg-slate-50 text-sm font-medium"
                                                placeholder="cliente@email.com"/>

                                        <div className="col-span-2">
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Dirección</label>
                                            <textarea value={formData.address} rows="2"
                                                onChange={e => setFormData({...formData, address:e.target.value})}

                                </div>
                            </div>
                        </div>
