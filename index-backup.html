    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te lo Imprimo - Presupuestos</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    <div id="root"></div>
    
    <!-- Firebase Configuration -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB1inCo-ydOBIPR3idkOIBo0jSnP5fefFY",
            authDomain: "presupuestostli.firebaseapp.com",
            projectId: "presupuestostli",
            storageBucket: "presupuestostli.firebasestorage.app",
            messagingSenderId: "717471108766",
            appId: "1:717471108766:web:76a807b8b4062bfab0b58f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>
    
    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Icons Component
        const Icons = {
            Plus: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/>
                </svg>
            ),
            Users: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
            ),
            FileText: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            ),
            Settings: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            ),
            Dashboard: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
            ),
            ArrowLeft: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            ),
            Download: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
            ),
            Save: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                </svg>
            ),
            Trash2: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            ),
            Edit2: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
            ),
            TrendingUp: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                </svg>
            ),
            CheckCircle: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            ),
            Send: ({className="w-6 h-6"}) => (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
            )
        };

        
        // Login Component
        function Login() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    console.error('Error al iniciar sesión:', err);
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
                        setError('Email o contraseña incorrectos');
                    } else if (err.code === 'auth/invalid-email') {
                        setError('Email inválido');
                    } else {
                        setError('Error al iniciar sesión. Intenta de nuevo.');
                    }
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 flex items-center justify-center p-4">
                    <div className="max-w-md w-full">
                        <div className="bg-white rounded-2xl shadow-2xl p-8">
                            <div className="text-center mb-8">
                                <div className="bg-gradient-to-r from-blue-600 to-purple-600 p-4 rounded-full w-20 h-20 mx-auto mb-4 flex items-center justify-center">
                                    <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                </div>
                                <h1 className="text-3xl font-bold text-gray-800 mb-2">Te lo Imprimo</h1>
                                <p className="text-gray-600">Sistema de Presupuestos</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-6">
                                {error && (
                                    <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                                        {error}
                                    </div>
                                )}

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Email</label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="tu@email.com"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="••••••••"
                                        required
                                    />
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    {loading ? 'Iniciando sesión...' : 'Iniciar Sesión'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setUser(user);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = async () => {
                if (window.confirm('¿Estás seguro de que quieres cerrar sesión?')) {
                    await auth.signOut();
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mx-auto"></div>
                            <p className="mt-4 text-slate-600">Cargando...</p>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return <Login />;
            }

            return <MainApp user={user} onLogout={handleLogout} />;
        }

        // Settings Component
        function SettingsView({ config, onSave }) {
            const [editableConfig, setEditableConfig] = useState(config);
            const [isSaving, setIsSaving] = useState(false);
            const [isExporting, setIsExporting] = useState(false);

            // Actualizar cuando cambie config desde Firebase
            useEffect(() => {
                setEditableConfig(config);
            }, [config]);

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        const newConfig = { ...editableConfig, logo: event.target.result };
                        setEditableConfig(newConfig);
                        await onSave(newConfig);
                        alert('Logo guardado y sincronizado!');
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSaveConfig = async () => {
                setIsSaving(true);
                try {
                    await onSave(editableConfig);
                    alert('Configuración guardada correctamente!');
                } catch (error) {
                    console.error('Error al guardar:', error);
                    alert('Error al guardar la configuración');
                }
                setIsSaving(false);
            };

            // NUEVA FUNCIÓN: Exportar todos los datos en JSON
            const exportToJSON = async () => {
                setIsExporting(true);
                try {
                    // Obtener todos los datos de Firebase
                    const clientsSnapshot = await db.collection('clients').get();
                    const quotesSnapshot = await db.collection('quotes').get();
                    const configSnapshot = await db.collection('config').doc('company').get();

                    const clients = clientsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const quotes = quotesSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const config = configSnapshot.exists ? configSnapshot.data() : {};

                    const backupData = {
                        exportDate: new Date().toISOString(),
                        version: '1.0',
                        clients: clients,
                        quotes: quotes,
                        config: config,
                        totalClients: clients.length,
                        totalQuotes: quotes.length
                    };

                    // Crear archivo JSON
                    const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const today = new Date().toISOString().split('T')[0];
                    a.download = `backup-teloimprimooficial-${today}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    alert(`✅ Backup creado exitosamente!\n\nClientes: ${clients.length}\nPresupuestos: ${quotes.length}`);
                } catch (error) {
                    console.error('Error al exportar:', error);
                    alert('Error al crear el backup');
                }
                setIsExporting(false);
            };

            // NUEVA FUNCIÓN: Exportar a Excel
            const exportToExcel = async () => {
                setIsExporting(true);
                try {
                    // Obtener todos los datos
                    const clientsSnapshot = await db.collection('clients').get();
                    const quotesSnapshot = await db.collection('quotes').get();

                    const clients = clientsSnapshot.docs.map(doc => {
                        const data = doc.data();
                        return {
                            'ID': doc.id,
                            'Nombre': data.name || '',
                            'RIF/CI': data.rif || '',
                            'Email': data.email || '',
                            'Teléfono': data.phone || '',
                            'Dirección': data.address || ''
                        };
                    });

                    const quotes = quotesSnapshot.docs.map(doc => {
                        const data = doc.data();
                        const subtotal = data.items?.reduce((sum, item) => 
                            sum + ((item.quantity || 0) * (item.unitPrice || 0)), 0) || 0;
                        const total = data.includeIva ? subtotal * 1.16 : subtotal;
                        
                        return {
                            'Número': data.number || '',
                            'Fecha': data.date || '',
                            'Cliente': data.client?.name || 'N/A',
                            'Vendedor': data.seller || '',
                            'Subtotal': subtotal.toFixed(2),
                            'Con IVA': data.includeIva ? 'Sí' : 'No',
                            'Total': total.toFixed(2),
                            'Estado': data.status || 'borrador',
                            'Condiciones': data.paymentConditions || '',
                            'Notas': data.notes || ''
                        };
                    });

                    // Crear CSV (compatible con Excel)
                    const createCSV = (data, headers) => {
                        const headerRow = headers.join(',');
                        const rows = data.map(row => 
                            headers.map(header => {
                                const value = row[header] || '';
                                // Escapar comillas y agregar comillas si hay comas
                                return value.toString().includes(',') ? `"${value}"` : value;
                            }).join(',')
                        );
                        return [headerRow, ...rows].join('\n');
                    };

                    const clientsCSV = createCSV(clients, Object.keys(clients[0] || {}));
                    const quotesCSV = createCSV(quotes, Object.keys(quotes[0] || {}));

                    // Descargar Clientes
                    const clientsBlob = new Blob(['\uFEFF' + clientsCSV], { type: 'text/csv;charset=utf-8;' });
                    const clientsUrl = URL.createObjectURL(clientsBlob);
                    const clientsLink = document.createElement('a');
                    const today = new Date().toISOString().split('T')[0];
                    clientsLink.href = clientsUrl;
                    clientsLink.download = `clientes-${today}.csv`;
                    document.body.appendChild(clientsLink);
                    clientsLink.click();
                    document.body.removeChild(clientsLink);

                    // Descargar Presupuestos
                    setTimeout(() => {
                        const quotesBlob = new Blob(['\uFEFF' + quotesCSV], { type: 'text/csv;charset=utf-8;' });
                        const quotesUrl = URL.createObjectURL(quotesBlob);
                        const quotesLink = document.createElement('a');
                        quotesLink.href = quotesUrl;
                        quotesLink.download = `presupuestos-${today}.csv`;
                        document.body.appendChild(quotesLink);
                        quotesLink.click();
                        document.body.removeChild(quotesLink);
                        URL.revokeObjectURL(quotesUrl);
                    }, 500);

                    URL.revokeObjectURL(clientsUrl);

                    alert(`✅ Archivos Excel/CSV creados!\n\n📄 clientes-${today}.csv\n📄 presupuestos-${today}.csv\n\nAbre con Excel o Google Sheets`);
                } catch (error) {
                    console.error('Error al exportar a Excel:', error);
                    alert('Error al crear archivos Excel');
                }
                setIsExporting(false);
            };

            return (
                <div className="max-w-4xl mx-auto p-6">
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <h2 className="text-2xl font-bold text-slate-800 mb-6">Configuración</h2>

                        <div className="mb-6">
                            <label className="block text-sm font-semibold text-slate-700 mb-2">Logo de la Empresa</label>
                            
                            {editableConfig.logo && (
                                <div className="mb-4 p-4 bg-slate-50 rounded-lg">
                                    <img src={editableConfig.logo} alt="Logo" className="max-w-xs mx-auto" />
                                </div>
                            )}

                            <input
                                type="file"
                                accept="image/*"
                                onChange={handleLogoUpload}
                                className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                            />
                            <p className="text-sm text-slate-500 mt-2">
                                Sube tu logo. Se sincronizará automáticamente en la nube y aparecerá en los PDFs.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Nombre de la Empresa *</label>
                                <input
                                    type="text"
                                    value={editableConfig.companyName}
                                    onChange={(e) => setEditableConfig({ ...editableConfig, companyName: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="Nombre de tu empresa"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">RIF *</label>
                                <input
                                    type="text"
                                    value={editableConfig.rif}
                                    onChange={(e) => setEditableConfig({ ...editableConfig, rif: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="J-XXXXXXXX-X"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Email *</label>
                                <input
                                    type="email"
                                    value={editableConfig.email}
                                    onChange={(e) => setEditableConfig({ ...editableConfig, email: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="email@empresa.com"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Sitio Web</label>
                                <input
                                    type="text"
                                    value={editableConfig.website}
                                    onChange={(e) => setEditableConfig({ ...editableConfig, website: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="www.tuempresa.com"
                                />
                            </div>
                        </div>

                        <div className="flex justify-end">
                            <button
                                onClick={handleSaveConfig}
                                disabled={isSaving}
                                className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center space-x-2"
                            >
                                <Icons.Save className="w-5 h-5" />
                                <span>{isSaving ? 'Guardando...' : 'Guardar Configuración'}</span>
                            </button>
                        </div>

                        <div className="mt-6 p-4 bg-blue-50 rounded-lg">
                            <p className="text-sm text-blue-800">
                                💡 <strong>Tip:</strong> Esta información aparecerá en todos tus presupuestos en formato PDF.
                            </p>
                        </div>

                        {/* NUEVA SECCIÓN: Backup y Exportar */}
                        <div className="mt-8 pt-8 border-t border-slate-200">
                            <h3 className="text-xl font-bold text-slate-800 mb-4">💾 Backup y Exportar Datos</h3>
                            
                            <div className="bg-gradient-to-r from-purple-50 to-blue-50 rounded-lg p-6 mb-6">
                                <p className="text-slate-700 mb-4">
                                    <strong>¿Por qué hacer backup?</strong> Mantén una copia de seguridad de todos tus clientes y presupuestos. 
                                    Es recomendable exportar tus datos mensualmente.
                                </p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {/* Botón JSON */}
                                    <div className="bg-white rounded-lg p-4 shadow-sm">
                                        <div className="flex items-start mb-3">
                                            <div className="bg-purple-100 p-2 rounded-lg mr-3">
                                                <svg className="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                                </svg>
                                            </div>
                                            <div className="flex-1">
                                                <h4 className="font-semibold text-slate-800 mb-1">Backup Completo (JSON)</h4>
                                                <p className="text-sm text-slate-600 mb-3">
                                                    Exporta TODOS los datos en formato JSON. Ideal para respaldo completo.
                                                </p>
                                                <button

        // Función para normalizar fechas (soporta múltiples formatos)
        function parseQuoteDate(dateStr) {
            if (!dateStr) return null;
            
            // Si ya es un objeto Date, retornarlo
            if (dateStr instanceof Date) return dateStr;
            
            // Formato ISO: "2026-02-01" o "2026-2-1"
            if (dateStr.match(/^\d{4}-\d{1,2}-\d{1,2}$/)) {
                const [year, month, day] = dateStr.split('-').map(Number);
                return new Date(year, month - 1, day); // month - 1 porque Date usa 0-11
            }
            
            // Formato DD/MM/YYYY: "01/02/2026" o "1/2/2026"
            if (dateStr.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)) {
                const [day, month, year] = dateStr.split('/').map(Number);
                return new Date(year, month - 1, day); // month - 1 porque Date usa 0-11
            }
            
            // Fallback: intentar parsear con Date
            return new Date(dateStr);
        }

        // Dashboard Component
        function Dashboard({ quotes, onViewQuote, onDeleteQuote, onUpdateStatus }) {
            const [selectedMonth, setSelectedMonth] = useState('current');
            
            // Obtener fecha actual
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            
            // Calcular presupuestos del mes actual (para el caso 'current')
            const currentMonthQuotes = quotes.filter(q => {
                if (!q.date) return false;
                const quoteDate = parseQuoteDate(q.date);
                if (!quoteDate) return false;
                return quoteDate.getFullYear() === currentYear && quoteDate.getMonth() === currentMonth;
            });
            
            // MODIFICACIÓN CLAVE: Filtrar presupuestos según el filtro seleccionado
            const filteredQuotes = selectedMonth === 'current' 
                ? currentMonthQuotes 
                : selectedMonth === 'all'
                ? quotes
                : quotes.filter(q => {
                    if (!q.date) return false;
                    const quoteDate = parseQuoteDate(q.date);
                    if (!quoteDate) return false;
                    const [year, month] = selectedMonth.split('-');
                    return quoteDate.getFullYear() === parseInt(year) && quoteDate.getMonth() === parseInt(month);
                });
            
            // MODIFICACIÓN CLAVE: Calcular estadísticas basadas en filteredQuotes en lugar de currentMonthQuotes
            const borradorCount = filteredQuotes.filter(q => !q.status || q.status === 'borrador').length;
            const enviadoCount = filteredQuotes.filter(q => q.status === 'enviado').length;
            const pagadoCount = filteredQuotes.filter(q => q.status === 'pagado').length;
            
            // Calcular total vendido (sin IVA, solo presupuestos pagados) - ahora dinámico
            const totalVendido = filteredQuotes
                .filter(q => q.status === 'pagado')
                .reduce((sum, q) => {
                    const subtotal = q.items?.reduce((itemSum, item) => {
                        return itemSum + ((item.quantity || 0) * (item.unitPrice || 0));
                    }, 0) || 0;
                    return sum + subtotal;

            // Calcular efectividad de ventas (presupuestos totales vs pagados) - ahora dinámico
            const totalPresupuestos = filteredQuotes.length;

                ? ((pagadoCount / totalPresupuestos) * 100).toFixed(1)

                if (!dateStr) return 0;
                const quoteDate = parseQuoteDate(dateStr);
                if (!quoteDate) return 0;
                const diffTime = Math.abs(now - quoteDate);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            const mesesNombres = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            const ventasPorMes = Array(12).fill(0);

                if (quoteDate.getFullYear() === currentYear) {

            if (oldestQuote) {

                const endDate = new Date();
                while (date <= endDate) {

                    const month = date.getMonth();

        // Client Search Component (Autocomplete)
        function ClientSearch({ clients, selectedClient, onSelect, onNewClient }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [isOpen, setIsOpen] = useState(false);
            const [highlightedIndex, setHighlightedIndex] = useState(0);
            const searchRef = React.useRef(null);

            // Filtrar clientes según búsqueda
            const filteredClients = clients.filter(client => {
                const searchLower = searchTerm.toLowerCase();
                return (
                    client.name?.toLowerCase().includes(searchLower) ||
                    client.rif?.toLowerCase().includes(searchLower) ||
                    client.email?.toLowerCase().includes(searchLower)
                );
            });

            // Cerrar dropdown al hacer clic fuera
            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (searchRef.current && !searchRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            // Manejar teclas de navegación
            const handleKeyDown = (e) => {
                if (!isOpen) {
                    if (e.key === 'ArrowDown' || e.key === 'Enter') {
                        setIsOpen(true);
                        e.preventDefault();
                    }
                    return;
                }

                switch (e.key) {
                    case 'ArrowDown':
                        e.preventDefault();
                        setHighlightedIndex(prev => 
                            prev < filteredClients.length - 1 ? prev + 1 : prev
                        );
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        setHighlightedIndex(prev => prev > 0 ? prev - 1 : 0);
                        break;
                    case 'Enter':
                        e.preventDefault();
                        if (filteredClients[highlightedIndex]) {
                            handleSelect(filteredClients[highlightedIndex]);
                        }
                        break;
                    case 'Escape':
                        setIsOpen(false);
                        break;
                }
            };

            const handleSelect = (client) => {
                onSelect(client);
                setSearchTerm('');
                setIsOpen(false);
                setHighlightedIndex(0);
            };

            const displayValue = selectedClient 
                ? `${selectedClient.name}${selectedClient.rif ? ` - ${selectedClient.rif}` : ''}`
                : '';

            return (
                <div className="mb-6">
                    <label className="block text-sm font-semibold text-slate-700 mb-2">Cliente</label>
                    <div className="flex gap-2">
                        <div ref={searchRef} className="flex-1 relative">
                            <div className="relative">
                                <input
                                    type="text"
                                    value={isOpen ? searchTerm : displayValue}
                                    onChange={(e) => {
                                        setSearchTerm(e.target.value);
                                        setIsOpen(true);
                                        setHighlightedIndex(0);
                                    }}
                                    onFocus={() => setIsOpen(true)}
                                    onKeyDown={handleKeyDown}
                                    placeholder="Buscar o seleccionar cliente..."
                                    className="w-full px-4 py-2 pr-10 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                />
                                <button
                                    type="button"
                                    onClick={() => setIsOpen(!isOpen)}
                                    className="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
                                    </svg>
                                </button>
                                {selectedClient && (
                                    <button
                                        type="button"
                                        onClick={() => {
                                            onSelect(null);
                                            setSearchTerm('');
                                        }}
                                        className="absolute right-9 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-600"
                                        title="Limpiar selección"
                                    >
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                                        </svg>
                                    </button>
                                )}
                            </div>

                            {/* Dropdown de resultados */}
                            {isOpen && (
                                <div className="absolute z-50 w-full mt-1 bg-white border border-slate-300 rounded-lg shadow-lg max-h-60 overflow-y-auto">
                                    {filteredClients.length > 0 ? (
                                        filteredClients.map((client, index) => (
                                            <button
                                                key={client.id}
                                                type="button"
                                                onClick={() => handleSelect(client)}
                                                className={`w-full text-left px-4 py-2 hover:bg-blue-50 transition-colors ${
                                                    index === highlightedIndex ? 'bg-blue-50' : ''
                                                }`}
                                            >
                                                <div className="font-semibold text-slate-800">{client.name}</div>
                                                {client.rif && (
                                                    <div className="text-sm text-slate-600">RIF: {client.rif}</div>
                                                )}
                                                {client.email && (
                                                    <div className="text-xs text-slate-500">{client.email}</div>
                                                )}
                                            </button>
                                        ))
                                    ) : (
                                        <div className="px-4 py-3 text-sm text-slate-500 text-center">
                                            No se encontraron clientes
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                        
                        <button
                            type="button"
                            onClick={onNewClient}
