                    <p className="text-xs text-slate-500 mt-1">
                        {selectedClient 
                            ? `✓ Cliente seleccionado: ${selectedClient.name}` 
                            : 'Escribe para buscar o haz clic para ver todos los clientes'}
                    </p>
                </div>
            );
        }

        // Quote Form Component (continuará con todo el código del formulario...)
        function QuoteForm({ quote, clients, config, onSave, onCancel, onGoToClients }) {
            // Función para formatear fecha a dd/mm/yyyy
            const formatDateToDDMMYYYY = (date) => {
                const d = new Date(date);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                return `${day}/${month}/${year}`;
            };
            
            // Función para convertir dd/mm/yyyy a yyyy-mm-dd (para el input type="date")
            const ddmmyyyyToISO = (dateStr) => {
                if (!dateStr) return '';
                if (dateStr.includes('-')) return dateStr; // Ya está en formato ISO
                const [day, month, year] = dateStr.split('/');
                return `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
            };
            
            // Función para convertir yyyy-mm-dd a dd/mm/yyyy (para guardar)
            const isoToDDMMYYYY = (isoDate) => {
                if (!isoDate) return '';
                if (isoDate.includes('/')) return isoDate; // Ya está en formato dd/mm/yyyy
                const [year, month, day] = isoDate.split('-');
                return `${day}/${month}/${year}`;
            };
            
            const [formData, setFormData] = useState(
                quote || {
                    number: '',
                    date: formatDateToDDMMYYYY(new Date()),
                    seller: '',
                    client: null,
                    items: [{ quantity: 1, description: '', unitPrice: 0 }],
                    includeIva: false,
                    paymentConditions: 'Transferencia - Pago Móvil',
                    validUntil: '',
                    notes: '',
                    status: 'borrador' // Estado por defecto
                }
            );

            // Generar número secuencial consultando Firebase
            // IMPORTANTE: Requiere índice compuesto en Firebase Firestore
            // Si da error la primera vez, Firebase te dará un link para crear el índice automáticamente
            // Índice necesario: Collection: quotes, Fields: number (Ascending), __name__ (Ascending)
            useEffect(() => {
                const generateSequentialNumber = async () => {
                    if (!formData.number) {
                        const year = new Date().getFullYear();
                        
                        try {
                            // Buscar el último presupuesto del año actual
                            const snapshot = await db.collection('quotes')
                                .where('number', '>=', `${year}-`)
                                .where('number', '<', `${year + 1}-`)
                                .orderBy('number', 'desc')
                                .limit(1)
                                .get();
                            
                            let nextNumber = 1;
                            
                            if (!snapshot.empty) {
                                const lastQuote = snapshot.docs[0].data();
                                const lastNumber = lastQuote.number.split('-')[1];
                                nextNumber = parseInt(lastNumber) + 1;
                            }
                            
                            const paddedNumber = nextNumber.toString().padStart(3, '0');
                            setFormData(prev => ({ ...prev, number: `${year}-${paddedNumber}` }));
                        } catch (error) {
                            console.error('Error generando número secuencial:', error);
                            // Si falla (probablemente falta índice), mostrar link en consola
                            if (error.message.includes('index')) {
                                console.warn('⚠️ Necesitas crear un índice en Firebase. Revisa la consola del navegador para el link.');
                            }
                            // Fallback a número aleatorio si hay error
                            const randomNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                            setFormData(prev => ({ ...prev, number: `${year}-${randomNum}` }));
                        }
                    }
                };
                
                generateSequentialNumber();
            }, []);

            // Limpiar storage temporal cuando se seleccione un cliente
            useEffect(() => {
                if (formData.client && sessionStorage.getItem('tempQuote')) {
                    sessionStorage.removeItem('tempQuote');
                }
            }, [formData.client]);

            const addItem = () => {
                setFormData(prev => ({
                    ...prev,
                    items: [...prev.items, { quantity: 1, description: '', unitPrice: 0 }]
                }));
            };

            const removeItem = (index) => {
                setFormData(prev => ({
                    ...prev,
                    items: prev.items.filter((_, i) => i !== index)
                }));
            };

            const updateItem = (index, field, value) => {
                setFormData(prev => ({
                    ...prev,
                    items: prev.items.map((item, i) =>
                        i === index ? { ...item, [field]: value } : item
                    )
                }));
            };

            const calculateSubtotal = () => {
                return formData.items.reduce((sum, item) => {
                    return sum + ((item.quantity || 0) * (item.unitPrice || 0));
                }, 0);
            };

            const calculateTotal = () => {
                const subtotal = calculateSubtotal();
                return formData.includeIva ? subtotal * 1.16 : subtotal;
            };

            const handleSave = async () => {
                if (!formData.client) {
                    alert('Por favor selecciona un cliente');
                    return;
                }
                await onSave(formData);
            };

            // NUEVA FUNCIÓN: Enviar presupuesto por email con EmailJS
            const sendEmailWithPDF = async () => {
                if (!formData.client || !formData.client.email) {
                    alert('❌ El cliente no tiene email registrado');
                    return;
                }

                if (!quote) {
                    alert('⚠️ Debes guardar el presupuesto antes de enviarlo');
                    return;
                }

                const confirmSend = window.confirm(
                    `¿Enviar presupuesto ${formData.number} a ${formData.client.email}?`
                );
                
                if (!confirmSend) return;

                try {
                    // Mostrar indicador de carga
                    const originalButton = event.target;
                    originalButton.disabled = true;
                    originalButton.innerHTML = '<svg class="animate-spin h-5 w-5 mr-2 inline" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Enviando...';

                    // Calcular totales para el email
                    const subtotal = calculateSubtotal();
                    const total = calculateTotal();

                    // Inicializar EmailJS
                    emailjs.init('a1HvREFCCu6s4gwt_'); // Tu Public Key (corregido)

                    // Preparar datos del email - Asegurar que todos sean strings
                    const templateParams = {
                        to_email: String(formData.client.email || ''),
                        client_name: String(formData.client.name || ''),
                        quote_number: String(formData.number || ''),
                        quote_date: String(formData.date || ''),
                        subtotal: String(subtotal.toFixed(2)),
                        total: String(total.toFixed(2)),
                        payment_conditions: String(formData.paymentConditions || 'A convenir'),
                        seller: String(formData.seller || 'Te lo Imprimo'),
                        company_email: String(config?.email || 'teloimprimooficial@gmail.com')
                    };

                    // Enviar email usando EmailJS
                    const response = await emailjs.send(
                        'service_u32o7yh',  // Tu Service ID
                        'template_vmpe01h', // Tu Template ID (corregido)
                        templateParams
                    );

                    // Restaurar botón
                    originalButton.disabled = false;
                    originalButton.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><span>Enviar por Email</span>';

                    if (response.status === 200) {
                        // Actualizar estado del presupuesto a "enviado"
                        await db.collection('quotes').doc(quote.id).update({
                            status: 'enviado',
                            lastSentDate: new Date().toISOString()
                        });

                        alert(`✅ ¡Email enviado exitosamente!\n\n📧 Enviado a: ${formData.client.email}\n📄 Presupuesto: ${formData.number}\n\n✨ Estado actualizado a "Enviado"`);
                    }

                } catch (error) {
                    console.error('Error al enviar email:', error);
                    
                    // Restaurar botón en caso de error
                    if (event.target) {
                        event.target.disabled = false;
                        event.target.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><span>Enviar por Email</span>';
                    }
                    
                    alert(`❌ Error al enviar el email\n\n${error.text || error.message || 'Intenta de nuevo'}`);
                }
            };

            const generatePDF = async () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 15;
                let y = 15;

                // ===== HEADER ARCOÍRIS =====
                const headerHeight = 35;
                const colorBands = [
                    [139, 92, 246],   // Morado
                    [59, 130, 246],   // Azul
                    [16, 185, 129],   // Verde
                    [245, 158, 11],   // Naranja
                    [251, 191, 36]    // Amarillo
                ];
                
                const bandWidth = pageWidth / colorBands.length;
                colorBands.forEach((color, i) => {
                    const gradient = doc.setFillColor(color[0], color[1], color[2]);
                    doc.rect(i * bandWidth, 0, bandWidth, headerHeight, 'F');
                });

                // Logo (si existe)
                if (config.logo) {
                    try {
                        doc.addImage(config.logo, 'PNG', margin, 8, 25, 25);
                    } catch (e) {
                        console.error('Error al agregar logo:', e);
                    }
                }

                // Texto del header (dentro del arcoíris)
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.setFont(undefined, 'bold');
                
                // Servicios a la derecha del logo
                const services = [
                    'GRABADO LASER    PENDONES',
                    'BANNER    PRINGRAF PAF',
                    'ETIQUETAS    SUBLIMACION',
                    'IMPRESION EN VINIL'
                ];
                
                let serviceY = 12;
                services.forEach(service => {
                    doc.text(service, margin + 35, serviceY);
                    serviceY += 4;
                });

                // Slogan abajo a la derecha
                doc.setFontSize(8);
                doc.setFont(undefined, 'italic');
                doc.text('Te lo imaginas • Nosotros lo hacemos', pageWidth - margin - 5, headerHeight - 5, { align: 'right' });

                y = headerHeight + 5;

                // ===== INFORMACIÓN DE LA EMPRESA (debajo del header) =====
                doc.setTextColor(120, 120, 120);
                doc.setFontSize(8);
                doc.setFont(undefined, 'normal');
                const companyInfo = `RIF: ${config.rif} | ${config.email} | ${config.website}`;
                doc.text(companyInfo, pageWidth / 2, y, { align: 'center' });
                
                y += 10;

                // ===== TÍTULO DEL PRESUPUESTO =====
                doc.setTextColor(59, 130, 246);
                doc.setFontSize(16);
                doc.setFont(undefined, 'bold');
                doc.text(`Presupuesto ${formData.number}`, margin, y);
                
                y += 8;
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.text(`Fecha: ${formData.date}`, margin, y);
                doc.text(`Vendedor: ${formData.seller}`, margin + 50, y);

                y += 10;

                // ===== INFORMACIÓN DEL CLIENTE (con borde azul) =====
                const clientBoxY = y;
                const clientBoxHeight = 30;
                
                // Borde azul a la izquierda
                doc.setDrawColor(59, 130, 246);
                doc.setLineWidth(2);
                doc.line(margin, clientBoxY, margin, clientBoxY + clientBoxHeight);
                
                // Fondo gris muy claro
                doc.setFillColor(249, 250, 251);
                doc.rect(margin + 2, clientBoxY, pageWidth - 2 * margin - 2, clientBoxHeight, 'F');

                // Contenido del cliente
                doc.setFontSize(9);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text('Cliente', margin + 5, clientBoxY + 5);
                
                doc.setFont(undefined, 'bold');
                doc.setFontSize(10);
                doc.text(formData.client.name, margin + 5, clientBoxY + 11);
                
                doc.setFont(undefined, 'normal');
                doc.setFontSize(8);
                let clientY = clientBoxY + 16;
                if (formData.client.rif) {
                    doc.text(`RIF/CI: ${formData.client.rif}`, margin + 5, clientY);
                    clientY += 4;
                }
                if (formData.client.email) {
                    doc.text(`Email: ${formData.client.email}`, margin + 5, clientY);
                    clientY += 4;
                }
                if (formData.client.phone) {
                    doc.text(`Tel: ${formData.client.phone}`, margin + 5, clientY);
                    clientY += 4;
                }
                if (formData.client.address) {
                    doc.text(`Dir: ${formData.client.address}`, margin + 5, clientY);
                }

                y = clientBoxY + clientBoxHeight + 8;

                // ===== CONDICIONES (si existen) =====
                if (formData.paymentConditions) {
                    doc.setFontSize(8);
                    doc.setFont(undefined, 'bold');
                    doc.text(`Condiciones: `, margin, y);
                    doc.setFont(undefined, 'normal');
                    doc.text(formData.paymentConditions, margin + 22, y);
                    y += 8;
                }

                // ===== TABLA DE PRODUCTOS =====
                // Header de la tabla (fondo oscuro)
                doc.setFillColor(52, 73, 94);
                doc.rect(margin, y, pageWidth - 2 * margin, 8, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.setFont(undefined, 'bold');
                doc.text('Cant', margin + 3, y + 5);
                doc.text('Descripción', margin + 20, y + 5);
                doc.text('Precio UND', pageWidth - margin - 45, y + 5);
                doc.text('Total', pageWidth - margin - 15, y + 5);
                
                y += 10;

                // Items de la tabla
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                
                formData.items.forEach((item, index) => {
                    // Alternar color de fondo
                    if (index % 2 === 0) {
                        doc.setFillColor(249, 250, 251);
                        doc.rect(margin, y - 4, pageWidth - 2 * margin, 8, 'F');
                    }
                    
                    const total = (item.quantity || 0) * (item.unitPrice || 0);
                    doc.text(String(item.quantity), margin + 3, y);
                    
                    // Descripción con wrapping si es muy larga
                    const maxWidth = pageWidth - margin - 80;
                    const lines = doc.splitTextToSize(item.description, maxWidth);
                    doc.text(lines, margin + 20, y);
                    
                    doc.text(`$${(item.unitPrice || 0).toFixed(2)}`, pageWidth - margin - 45, y);
                    doc.text(`$${total.toFixed(2)}`, pageWidth - margin - 15, y, { align: 'right' });
                    
                    y += Math.max(8, lines.length * 5);
                });

                y += 5;

                // ===== TOTALES =====
                const subtotal = calculateSubtotal();
                const iva = formData.includeIva ? subtotal * 0.16 : 0;
                const total = subtotal + iva;

                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                
                // Línea separadora
                doc.setDrawColor(200, 200, 200);
                doc.setLineWidth(0.5);
                doc.line(pageWidth - margin - 60, y, pageWidth - margin, y);
                y += 5;

                doc.text('Subtotal:', pageWidth - margin - 45, y);
                doc.text(`$${subtotal.toFixed(2)}`, pageWidth - margin - 15, y, { align: 'right' });
                y += 5;

                if (formData.includeIva) {
                    doc.text('IVA 16%:', pageWidth - margin - 45, y);
                    doc.text(`$${iva.toFixed(2)}`, pageWidth - margin - 15, y, { align: 'right' });
                    
                    // Línea antes del total
                    y += 3;
                    doc.setDrawColor(200, 200, 200);
                    doc.line(pageWidth - margin - 60, y, pageWidth - margin, y);
                    y += 5;
                }

                doc.setFont(undefined, 'bold');
                doc.setFontSize(11);
                doc.setTextColor(59, 130, 246);
                doc.text('Total:', pageWidth - margin - 45, y);
                doc.text(`$${total.toFixed(2)}`, pageWidth - margin - 15, y, { align: 'right' });

                y += 10;

                // ===== NOTAS (con fondo amarillo claro) =====
                if (formData.notes || formData.validUntil) {
                    doc.setFillColor(254, 252, 232);
                    doc.setDrawColor(251, 191, 36);
                    doc.setLineWidth(0.5);
                    
                    const notesHeight = 15;
                    doc.rect(margin, y, pageWidth - 2 * margin, notesHeight, 'FD');
                    
                    doc.setFontSize(8);
                    doc.setTextColor(0, 0, 0);
                    doc.setFont(undefined, 'bold');
                    
                    let noteY = y + 5;
                    if (formData.notes) {
                        doc.text(`Nota: `, margin + 3, noteY);
                        doc.setFont(undefined, 'normal');
                        doc.text(formData.notes, margin + 12, noteY);
                        noteY += 4;
                    }
                    
                    if (formData.validUntil) {
                        doc.setFont(undefined, 'bold');
                        doc.text(`Válido hasta: `, margin + 3, noteY);
                        doc.setFont(undefined, 'normal');
                        doc.text(formData.validUntil, margin + 25, noteY);
                    }
                    
                    y += notesHeight + 5;
                }

                // ===== DATOS DE PAGO (al final) =====
                y += 5;
                doc.setFontSize(9);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(0, 0, 0);
                doc.text('Datos de Pago', pageWidth / 2, y, { align: 'center' });
                y += 5;
                doc.setFontSize(8);
                doc.setFont(undefined, 'normal');
                doc.text(`Pago Móvil: 0414-2593085 | CI: 16676859 | Bancamiga/Banesco`, pageWidth / 2, y, { align: 'center' });

                // Guardar con nombre correcto
                doc.save(`Presupuesto-${formData.number}.pdf`);
            };

            return (
                <div className="max-w-5xl mx-auto p-6">
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {quote ? 'Editar Presupuesto' : 'Nuevo Presupuesto'}
                            </h2>
                            <button
                                onClick={onCancel}
                                className="text-slate-600 hover:text-slate-900"
                            >
                                <Icons.ArrowLeft className="w-6 h-6" />
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">
                                    Número de Presupuesto
                                </label>
                                <input
                                    type="text"
                                    value={formData.number}
                                    onChange={(e) => setFormData({ ...formData, number: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Fecha</label>
                                <input
                                    type="date"
                                    value={ddmmyyyyToISO(formData.date)}
                                    onChange={(e) => setFormData({ ...formData, date: isoToDDMMYYYY(e.target.value) })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Vendedor</label>
                                <input
                                    type="text"
                                    value={formData.seller}
                                    onChange={(e) => setFormData({ ...formData, seller: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                    placeholder="Nombre del vendedor"
                                />
                            </div>
                        </div>

                        <ClientSearch
                            clients={clients}
                            selectedClient={formData.client}
                            onSelect={(client) => setFormData({ ...formData, client: client })}
                            onNewClient={() => {
                                if (onGoToClients) {
                                    onGoToClients(formData);
                                }
                            }}
                        />

                        <div className="mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <label className="block text-sm font-semibold text-slate-700">
                                    Productos/Servicios
                                </label>
                                <button
                                    onClick={addItem}
                                    className="flex items-center space-x-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                >
                                    <Icons.Plus className="w-4 h-4" />
                                    <span>Agregar Item</span>
                                </button>
                            </div>

                            {formData.items.map((item, index) => (
                                <div key={index} className="flex gap-2 mb-3">
                                    <input
                                        type="number"
                                        value={item.quantity}
                                        onChange={(e) => updateItem(index, 'quantity', parseFloat(e.target.value) || 0)}
                                        className="w-20 px-3 py-2 border border-slate-300 rounded-lg"
                                        placeholder="Cant."
                                    />
                                    <input
                                        type="text"
                                        value={item.description}
                                        onChange={(e) => updateItem(index, 'description', e.target.value)}
                                        className="flex-1 px-4 py-2 border border-slate-300 rounded-lg"
                                        placeholder="Descripción"
                                    />
                                    <input
                                        type="number"
                                        value={item.unitPrice}
                                        onChange={(e) => updateItem(index, 'unitPrice', parseFloat(e.target.value) || 0)}
                                        className="w-32 px-3 py-2 border border-slate-300 rounded-lg"
                                        placeholder="Precio"
                                        step="0.01"
                                    />
                                    <div className="w-32 px-3 py-2 bg-slate-100 rounded-lg flex items-center justify-end">
                                        ${((item.quantity || 0) * (item.unitPrice || 0)).toFixed(2)}
                                    </div>
                                    {formData.items.length > 1 && (
                                        <button
                                            onClick={() => removeItem(index)}
                                            className="p-2 text-red-600 hover:bg-red-50 rounded-lg"
                                        >
                                            <Icons.Trash2 className="w-5 h-5" />
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>

                        <div className="bg-slate-50 rounded-lg p-4 mb-6">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-slate-700">Subtotal:</span>
                                <span className="font-semibold">${calculateSubtotal().toFixed(2)}</span>
                            </div>
                            <div className="flex justify-between items-center mb-2">
                                <label className="flex items-center space-x-2">
                                    <input
                                        type="checkbox"
                                        checked={formData.includeIva}
                                        onChange={(e) => setFormData({ ...formData, includeIva: e.target.checked })}
                                        className="rounded"
                                    />
                                    <span className="text-slate-700">IVA (16%):</span>
                                </label>
                                <span className="font-semibold">
                                    ${formData.includeIva ? (calculateSubtotal() * 0.16).toFixed(2) : '0.00'}
                                </span>
                            </div>
                            <div className="flex justify-between items-center pt-2 border-t border-slate-300">
                                <span className="text-lg font-bold text-slate-800">Total:</span>
                                <span className="text-lg font-bold text-blue-600">${calculateTotal().toFixed(2)}</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">
                                    Condiciones de Pago
                                </label>
                                <input
                                    type="text"
                                    value={formData.paymentConditions}
                                    onChange={(e) => setFormData({ ...formData, paymentConditions: e.target.value })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">
                                    Válido hasta
                                </label>
                                <input
                                    type="date"
                                    value={ddmmyyyyToISO(formData.validUntil)}
                                    onChange={(e) => setFormData({ ...formData, validUntil: isoToDDMMYYYY(e.target.value) })}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                />
                            </div>
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-semibold text-slate-700 mb-2">Notas</label>
                            <textarea
                                value={formData.notes}
                                onChange={(e) => setFormData({ ...formData, notes: e.target.value })}
                                className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                rows="3"
                                placeholder="Notas adicionales..."
                            />
                        </div>

                        <div className="flex justify-end space-x-4">
                            <button
                                onClick={onCancel}
                                className="px-6 py-2 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50"
                            >
                                Cancelar
                            </button>
                            <button
                                onClick={handleSave}
                                className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center space-x-2"
                            >
                                <Icons.Save className="w-5 h-5" />
                                <span>Guardar</span>
                            </button>
                            {quote && (
                                <>
                                    <button
                                        onClick={generatePDF}
                                        className="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 flex items-center space-x-2"
                                    >
                                        <Icons.Download className="w-5 h-5" />
                                        <span>Generar PDF</span>
                                    </button>
                                    <button
                                        onClick={sendEmailWithPDF}
                                        className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 flex items-center space-x-2"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                        </svg>
                                        <span>Enviar por Email</span>
                                    </button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Clients Manager Component
        function ClientsManager({ clients, onSave, onDelete }) {
            const [editingClient, setEditingClient] = useState(null);
            const [showForm, setShowForm] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [formData, setFormData] = useState({
                name: '',
                rif: '',
                email: '',
                phone: '',
                address: ''
            });

            // Filtrar clientes según búsqueda
            const filteredClients = clients.filter(client => {
                const searchLower = searchTerm.toLowerCase();
                return (
                    client.name?.toLowerCase().includes(searchLower) ||
                    client.rif?.toLowerCase().includes(searchLower) ||
                    client.email?.toLowerCase().includes(searchLower) ||
                    client.phone?.toLowerCase().includes(searchLower)
                );
            });

            const handleEdit = (client) => {
                setFormData(client);
                setEditingClient(client);
                setShowForm(true);
            };

            const handleNew = () => {
                setFormData({
                    name: '',
                    rif: '',
                    email: '',
                    phone: '',
                    address: ''
                });
                setEditingClient(null);
                setShowForm(true);
            };

            const handleSave = async () => {
                const savedClient = await onSave(formData);
                setShowForm(false);
                setEditingClient(null);
                
                // Si hay un presupuesto temporal guardado, regresar a él
                const tempQuote = sessionStorage.getItem('tempQuote');
                if (tempQuote) {
                    sessionStorage.removeItem('tempQuote');
                    // Esperar un momento para que el cliente se guarde en Firebase
                    setTimeout(() => {
                        alert('Cliente guardado. Selecciónalo en el presupuesto.');
                    }, 500);
                }
            };

            if (showForm) {
                return (
                    <div className="max-w-2xl mx-auto p-6">
                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <h2 className="text-2xl font-bold text-slate-800 mb-6">
                                {editingClient ? 'Editar Cliente' : 'Nuevo Cliente'}
                            </h2>

                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">
                                        Nombre *
                                    </label>
                                    <input
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                        className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">RIF</label>
                                    <input
                                        type="text"
                                        value={formData.rif}
                                        onChange={(e) => setFormData({ ...formData, rif: e.target.value })}
                                        className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">Email</label>
                                    <input
                                        type="email"
                                        value={formData.email}
                                        onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                                        className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">Teléfono</label>
                                    <input
                                        type="tel"
                                        value={formData.phone}
                                        onChange={(e) => setFormData({ ...formData, phone: e.target.value })}
                                        className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">Dirección</label>
                                    <textarea
                                        value={formData.address}
                                        onChange={(e) => setFormData({ ...formData, address: e.target.value })}
                                        className="w-full px-4 py-2 border border-slate-300 rounded-lg"
                                        rows="3"
                                    />
                                </div>
                            </div>

                            <div className="flex justify-end space-x-4 mt-6">
                                <button
                                    onClick={() => setShowForm(false)}
                                    className="px-6 py-2 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50"
                                >
                                    Cancelar
                                </button>
                                <button
                                    onClick={handleSave}
                                    className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                >
                                    Guardar
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Clientes</h2>
                            {sessionStorage.getItem('tempQuote') && (
                                <p className="text-sm text-blue-600 mt-1">
                                    💡 Crea el cliente y luego vuelve al presupuesto para seleccionarlo
                                </p>
                            )}
                        </div>
                        <div className="flex gap-2">
                            {sessionStorage.getItem('tempQuote') && (
                                <button
                                    onClick={() => {
                                        window.location.reload(); // Recargar para volver al presupuesto
                                    }}
                                    className="flex items-center space-x-2 px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-700"
                                >
                                    <Icons.ArrowLeft className="w-5 h-5" />
                                    <span>Volver al Presupuesto</span>
                                </button>
                            )}
                            <button
                                onClick={handleNew}
                                className="flex items-center space-x-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                            >
                                <Icons.Plus className="w-5 h-5" />
                                <span>Nuevo Cliente</span>
                            </button>
                        </div>
                    </div>

                    {/* Campo de búsqueda */}
                    <div className="mb-6">
                        <div className="relative">
                            <input
                                type="text"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                placeholder="🔍 Buscar cliente por nombre, RIF, email o teléfono..."
                                className="w-full px-4 py-3 pr-10 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base"
                            />
                            {searchTerm && (
                                <button
                                    onClick={() => setSearchTerm('')}
                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                                    </svg>
                                </button>
                            )}
                        </div>
                        {searchTerm && (
                            <p className="text-sm text-slate-600 mt-2">
                                {filteredClients.length} cliente{filteredClients.length !== 1 ? 's' : ''} encontrado{filteredClients.length !== 1 ? 's' : ''}
                            </p>
                        )}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {filteredClients.map(client => (
                            <div key={client.id} className="bg-white rounded-lg shadow-md p-4 hover:shadow-lg transition-shadow">
                                <div className="flex justify-between items-start mb-3">
                                    <div>
                                        <h3 className="font-bold text-lg text-slate-800">{client.name}</h3>
                                        <p className="text-sm text-slate-600">{client.rif}</p>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button
                                            onClick={() => handleEdit(client)}
                                            className="p-2 text-blue-600 hover:bg-blue-50 rounded-lg"
                                        >
                                            <Icons.Edit2 className="w-4 h-4" />
                                        </button>
                                        <button
                                            onClick={() => onDelete(client.id)}
                                            className="p-2 text-red-600 hover:bg-red-50 rounded-lg"
                                        >
                                            <Icons.Trash2 className="w-4 h-4" />
                                        </button>
                                    </div>
                                </div>
                                {client.email && (
                                    <p className="text-sm text-slate-600 mb-1">📧 {client.email}</p>
                                )}
                                {client.phone && (
                                    <p className="text-sm text-slate-600 mb-1">📱 {client.phone}</p>
                                )}
                                {client.address && (
                                    <p className="text-sm text-slate-600">📍 {client.address}</p>
                                )}
                            </div>
                        ))}

                        {filteredClients.length === 0 && (
                            <div className="col-span-full text-center py-12 text-slate-500">
                                {searchTerm 
                                    ? `No se encontraron clientes con "${searchTerm}"`
                                    : 'No hay clientes registrados. Crea tu primer cliente.'}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
